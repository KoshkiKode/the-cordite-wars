name: "Deploy to Google Play"

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when a versioned release tag is pushed, or
# manually from the Actions tab.
#
# Required secrets:
#   ANDROID_RELEASE_KEYSTORE_B64       Base64-encoded release keystore (.jks)
#   ANDROID_RELEASE_KEYSTORE_ALIAS     Key alias inside the keystore
#   ANDROID_RELEASE_KEYSTORE_PASSWORD  Keystore + key password
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON   Service account JSON for the Play API
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track (internal / alpha / beta / production)"
        required: false
        default: "internal"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2-stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build the Android AAB (signed, release)
  # ─────────────────────────────────────────────────────────────────────────────
  build-aab:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_B64" ]; then
            echo "::error::ANDROID_RELEASE_KEYSTORE_B64 secret is required for Google Play deployment."
            echo "::error::Encode your .jks keystore with: base64 < release.jks | tr -d '\\n'"
            echo "::error::Then add the output as the ANDROID_RELEASE_KEYSTORE_B64 repository secret."
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > release.keystore

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/shutdown_adb_on_exit = false\n' \
            "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" \
            > ~/.config/godot/editor_settings-4.tres

      - name: Install Android Gradle build template
        run: |
          set -euo pipefail
          GODOT_VERSION="${{ env.GODOT_VERSION }}"
          # Build the Godot templates version string (e.g. "4.6.2.stable.mono")
          TEMPLATES_VERSION="$(echo "$GODOT_VERSION" | sed 's/-/./').mono"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/$TEMPLATES_VERSION"
          TPZ_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"

          echo "Downloading Godot ${GODOT_VERSION} export templates..."
          curl -L --fail -o /tmp/export_templates.tpz "$TPZ_URL"

          # Pre-populate the templates cache so firebelley/godot-export can skip
          # re-downloading them and save runner time.
          echo "Extracting export templates to ${TEMPLATES_DIR}..."
          mkdir -p "$TEMPLATES_DIR"
          unzip -q /tmp/export_templates.tpz -d /tmp/godot_tpz/
          mv /tmp/godot_tpz/templates/* "$TEMPLATES_DIR/"

          # Install the Android Gradle build template into the project directory.
          # Godot requires android/build/ to contain the Gradle project files when
          # gradle_build/use_gradle_build=true is set in the export preset.
          echo "Installing Android Gradle build template to android/build/..."
          mkdir -p android/build
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android/build/
          # Write the version marker that Godot validates before exporting.
          # Godot checks res://android/.build_version for Gradle template exports.
          echo "$TEMPLATES_VERSION" > android/.build_version
          # Keep the marker under android/build as well for compatibility.
          echo "$TEMPLATES_VERSION" > android/build/.build_version
          # Prevent Godot's file scanner from importing Gradle project files.
          touch android/build/.gdignore

          echo "Android Gradle build template installed (${TEMPLATES_VERSION}):"
          ls android/build/ | head -20
          rm -rf /tmp/export_templates.tpz /tmp/godot_tpz/

      - name: Export Android AAB (release-signed)
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          use_preset_export_path: true
          presets_to_export: "Android AAB"
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ./release.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ./release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}

      - name: Flatten Android AAB export output
        run: |
          # firebelley/godot-export nests the AAB in a preset-named subfolder.
          # Flatten build/android/Android AAB/ → build/android/ so paths are predictable.
          if [ -d "build/android/Android AAB" ]; then
            cp -a "build/android/Android AAB/." "build/android/"
            rm -rf "build/android/Android AAB"
            echo "Flattened build/android/Android AAB/ → build/android/"
          fi

      - name: Verify AAB
        run: |
          echo "Android build contents:"
          ls -la build/android/
          if [ ! -f build/android/CorditeWars.aab ]; then
            echo "ERROR: CorditeWars.aab not found"
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Android-AAB
          path: build/android/CorditeWars.aab

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Upload the AAB to Google Play
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-play-store:
    name: Upload to Google Play
    needs: build-aab
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Android-AAB
          path: build/android/

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.koshkikode.corditewars
          releaseFiles: build/android/CorditeWars.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: ""

      - name: Report result
        if: success()
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          echo "### ✅ Google Play Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Track   | ${TRACK} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check [Google Play Console](https://play.google.com/console) to promote the release." >> "$GITHUB_STEP_SUMMARY"
