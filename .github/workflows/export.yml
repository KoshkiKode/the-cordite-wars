name: "Export Godot Project"

on:
  workflow_dispatch:
  workflow_call:

env:
  GODOT_VERSION: "4.6.2-stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Validate project — confirm the boot scene and all platform presets exist
  #    before spending runner minutes on exports.
  # ─────────────────────────────────────────────────────────────────────────────
  validate-project:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check boot scene and required project files
        run: |
          set -euo pipefail
          ERRORS=0

          check_file() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      $1"
            fi
          }

          # Core Godot project files
          check_file project.godot
          check_file export_presets.cfg
          check_file scenes/Core/Boot.tscn
          check_file scenes/UI/MainMenu.tscn
          check_file scenes/UI/SplashScreen.tscn

          # Autoload singletons
          check_file src/Core/GameManager.cs
          check_file src/Core/EventBus.cs
          check_file src/Systems/Audio/AudioManager.cs
          check_file src/Systems/Localization/LocalizationManager.cs
          check_file src/Systems/Localization/SubtitleManager.cs

          # C# project
          check_file CorditeWars.csproj

          # Platform packaging assets
          check_file versions/windows/inno-setup.iss
          check_file versions/windows/CorditeWars.wxs
          check_file versions/windows/AppxManifest.xml
          check_file versions/linux/snapcraft.yaml
          check_file versions/linux/debian/control
          check_file versions/linux/flatpak/com.koshkikode.CorditeWars.yml
          check_file versions/linux/cordite-wars.desktop
          check_file versions/macos/entitlements.plist
          check_file versions/ios/ios-info.plist
          check_file versions/ios/ios-export-options.plist
          check_file assets/icons/icon.svg

          # Confirm Boot.tscn is the main scene
          if ! grep -q 'run/main_scene.*Boot\.tscn' project.godot; then
            echo "FAIL: project.godot does not set run/main_scene to Boot.tscn"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK:      project.godot -> Boot.tscn"
          fi

          # Confirm all required export presets are present
          for PRESET in "Windows Desktop" "Linux/X11" "Android" "Android AAB" "iOS" "macOS"; do
            if ! grep -q "name=\"$PRESET\"" export_presets.cfg; then
              echo "FAIL: export_presets.cfg missing preset: $PRESET"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      export preset: $PRESET"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Project validation FAILED with $ERRORS error(s)."
            exit 1
          fi
          echo ""
          echo "Project validation passed."

  # ─────────────────────────────────────────────────────────────────────────────
  # 0b. Resolve application version from canonical shared version source.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve-version:
    name: Resolve App Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.read_version.outputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read app version from versions/shared/version.json
        id: read_version
        run: |
          set -euo pipefail
          APP_VERSION="$(python - <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path("versions/shared/version.json")
          if not path.exists():
              print("ERROR: versions/shared/version.json not found in repository root", file=sys.stderr)
              raise SystemExit(1)
          try:
              data = json.loads(path.read_text())
              major = int(data["major"])
              minor = int(data["minor"])
              patch = int(data["patch"])
          except (json.JSONDecodeError, KeyError, TypeError, ValueError) as exc:
              print(f"ERROR: Invalid versions/shared/version.json: {exc}", file=sys.stderr)
              raise SystemExit(1)
          print(f"{major}.{minor}.{patch}")
          PY
          )"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: $APP_VERSION"

  # ─────────────────────────────────────────────────────────────────────────────
  # Workflow flowchart (Mermaid)
  #
  # flowchart TD
  #   V[Validate Project] --> E[Export Matrix (parallel)]
  #   P[Packaging Jobs]
  #   E --> P
  #   E --> S[Smoke Tests]
  # ─────────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Export each target via a matrix — Windows, Linux, macOS, and iOS all run
  #    on macos-latest and share an identical Godot installation step.  Android
  #    is handled separately because it requires JDK, Gradle, and keystore setup.
  # ─────────────────────────────────────────────────────────────────────────────
  export-platform:
    name: Export Platform (${{ matrix.name }})
    runs-on: macos-latest
    needs: validate-project
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            preset: "Windows Desktop"
            build_dir: build/windows
            artifact: CorditeWars-Windows
            export_mode: release
          - name: Linux
            preset: "Linux/X11"
            build_dir: build/linux
            artifact: CorditeWars-Linux
            export_mode: release
          - name: macOS
            preset: macOS
            build_dir: build/macos
            artifact: CorditeWars-macOS-Export
            export_mode: release
          - name: iOS
            preset: iOS
            build_dir: build/ios
            artifact: CorditeWars-iOS-iPadOS-Handoff
            export_mode: debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Inject App Store Team ID into iOS preset
        if: matrix.name == 'iOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # iOS handoff exports still require a non-empty Team ID in preset validation.
          # 0000000000 is a validation-only sentinel when no secret is configured.
          TEAM_ID="${APPLE_TEAM_ID:-0000000000}"
          export TEAM_ID
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          team_id = os.environ["TEAM_ID"]
          path = Path("export_presets.cfg")
          lines = path.read_text().splitlines()

          ios_preset_number = None
          current_preset = None
          in_preset_block = False
          for line in lines:
              stripped = line.strip()
              preset_match = re.match(r"\[preset\.(\d+)\]$", stripped)
              if preset_match:
                  current_preset = preset_match.group(1)
                  in_preset_block = True
                  continue
              if re.match(r"\[preset\.\d+\.options\]$", stripped):
                  in_preset_block = False
              if in_preset_block and stripped == 'platform="iOS"':
                  ios_preset_number = current_preset
                  break
          if ios_preset_number is None:
              raise SystemExit("iOS preset not found in export_presets.cfg")

          target_options_header = f"[preset.{ios_preset_number}.options]"
          out = []
          in_ios_options = False
          inserted = False
          for line in lines:
              stripped = line.strip()
              if stripped == target_options_header:
                  in_ios_options = True
                  out.append(line)
                  continue
              if in_ios_options and stripped.startswith("["):
                  if not inserted:
                      out.append(f'application/app_store_team_id="{team_id}"')
                      inserted = True
                  in_ios_options = False
              if in_ios_options and line.startswith("application/app_store_team_id="):
                  out.append(f'application/app_store_team_id="{team_id}"')
                  inserted = True
                  continue
              out.append(line)
          if in_ios_options and not inserted:
              out.append(f'application/app_store_team_id="{team_id}"')
          path.write_text("\n".join(out) + "\n")
          PY
        shell: bash

      - name: Install Godot editor and export templates
        run: |
          set -euo pipefail
          GODOT_VERSION="${{ env.GODOT_VERSION }}"
          GODOT_ZIP="$RUNNER_TEMP/godot-mono.zip"
          TEMPLATES_TPZ="$RUNNER_TEMP/export-templates.tpz"
          GODOT_EXTRACT_DIR="$RUNNER_TEMP/godot-extract"
          TEMPLATES_EXTRACT_DIR="$RUNNER_TEMP/templates-extract"
          GODOT_APP_MATCHES_FILE=""
          TEMPLATES_MATCHES_FILE=""
          cleanup_temp_match_files() {
            [ -n "$GODOT_APP_MATCHES_FILE" ] && rm -f "$GODOT_APP_MATCHES_FILE"
            [ -n "$TEMPLATES_MATCHES_FILE" ] && rm -f "$TEMPLATES_MATCHES_FILE"
          }
          trap cleanup_temp_match_files EXIT

          rm -rf "$GODOT_EXTRACT_DIR" "$TEMPLATES_EXTRACT_DIR"
          mkdir -p "$GODOT_EXTRACT_DIR" "$TEMPLATES_EXTRACT_DIR"

          curl -L --fail \
            -o "$GODOT_ZIP" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_macos.universal.zip"
          unzip -q "$GODOT_ZIP" -d "$GODOT_EXTRACT_DIR"

          GODOT_APP_MATCHES_FILE="$(mktemp)"
          find "$GODOT_EXTRACT_DIR" -type d -name '*.app' > "$GODOT_APP_MATCHES_FILE"
          GODOT_APP_COUNT="$(wc -l < "$GODOT_APP_MATCHES_FILE" | tr -d ' ')"
          if [ "$GODOT_APP_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 .app bundle after extraction, found $GODOT_APP_COUNT."
            cat "$GODOT_APP_MATCHES_FILE"
            exit 1
          fi
          GODOT_APP_PATH="$(sed -n '1p' "$GODOT_APP_MATCHES_FILE")"
          xattr -r -d com.apple.quarantine "$GODOT_APP_PATH" 2>/dev/null || true
          GODOT_BIN="$GODOT_APP_PATH/Contents/MacOS/Godot"
          if [ ! -f "$GODOT_BIN" ]; then
            GODOT_BIN=$(find "$GODOT_APP_PATH/Contents/MacOS" -maxdepth 1 -type f | head -1)
          fi
          if [ -z "$GODOT_BIN" ] || [ ! -f "$GODOT_BIN" ]; then
            echo "ERROR: Godot binary not found inside $GODOT_APP_PATH/Contents/MacOS/"
            ls -la "$GODOT_APP_PATH/Contents/MacOS/" 2>/dev/null || true
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          curl -L --fail \
            -o "$TEMPLATES_TPZ" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"
          unzip -q "$TEMPLATES_TPZ" -d "$TEMPLATES_EXTRACT_DIR"

          TEMPLATES_MATCHES_FILE="$(mktemp)"
          find "$TEMPLATES_EXTRACT_DIR" -type d -name templates > "$TEMPLATES_MATCHES_FILE"
          TEMPLATES_COUNT="$(wc -l < "$TEMPLATES_MATCHES_FILE" | tr -d ' ')"
          if [ "$TEMPLATES_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 templates directory in export template archive, found $TEMPLATES_COUNT."
            cat "$TEMPLATES_MATCHES_FILE"
            exit 1
          fi
          TEMPLATES_SRC_DIR="$(sed -n '1p' "$TEMPLATES_MATCHES_FILE")"

          TEMPLATES_VERSION="$(echo "$GODOT_VERSION" | sed 's/-/./').mono"
          TEMPLATES_DEST_DIR="$HOME/Library/Application Support/Godot/export_templates/$TEMPLATES_VERSION"
          mkdir -p "$TEMPLATES_DEST_DIR"
          cp -R "$TEMPLATES_SRC_DIR/." "$TEMPLATES_DEST_DIR/"

      - name: Export ${{ matrix.name }}
        run: |
          mkdir -p "${{ matrix.build_dir }}"
          "$GODOT_BIN" --headless --path ./ --export-${{ matrix.export_mode }} "${{ matrix.preset }}"

      - name: Flatten Windows export output
        if: matrix.name == 'Windows'
        run: |
          if [ -d "build/windows/Windows Desktop" ]; then
            cp -a "build/windows/Windows Desktop/." build/windows/
            rm -rf "build/windows/Windows Desktop"
            echo "Flattened build/windows/Windows Desktop/ → build/windows/"
          fi

      - name: Flatten Linux export output
        if: matrix.name == 'Linux'
        run: |
          if [ -d "build/linux/LinuxX11" ]; then
            cp -a "build/linux/LinuxX11/." build/linux/
            rm -rf "build/linux/LinuxX11"
            echo "Flattened build/linux/LinuxX11/ → build/linux/"
          fi

      - name: Flatten macOS export output
        if: matrix.name == 'macOS'
        run: |
          if [ -d "build/macos/macOS" ]; then
            cp -a "build/macos/macOS/." build/macos/
            rm -rf "build/macos/macOS"
            echo "Flattened build/macos/macOS/ → build/macos/"
          fi

      - name: Verify Windows export
        if: matrix.name == 'Windows'
        run: |
          echo "Windows export contents:"
          ls -la build/windows/
          if [ ! -f build/windows/CorditeWars.exe ]; then
            echo "ERROR: CorditeWars.exe not found after export"
            exit 1
          fi
          if [ ! -f build/windows/CorditeWars.pck ]; then
            echo "ERROR: CorditeWars.pck not found after export"
            exit 1
          fi
          if [ ! -d build/windows/GodotSharp ] && ! compgen -G "build/windows/data_*_windows_*" > /dev/null; then
            echo "ERROR: No .NET runtime data directory found (expected GodotSharp or data_*_windows_*)"
            exit 1
          fi

      - name: Verify Linux export
        if: matrix.name == 'Linux'
        run: |
          echo "Linux export contents:"
          ls -la build/linux/
          if [ ! -f build/linux/CorditeWars.x86_64 ]; then
            echo "ERROR: CorditeWars.x86_64 not found after export"
            exit 1
          fi
          if [ ! -f build/linux/CorditeWars.pck ]; then
            echo "ERROR: CorditeWars.pck not found after export"
            exit 1
          fi
          if [ ! -d build/linux/GodotSharp ] && ! compgen -G "build/linux/data_*_linux*" > /dev/null; then
            echo "ERROR: No .NET runtime data directory found (expected GodotSharp or data_*_linux*)"
            exit 1
          fi

      - name: Verify macOS export
        if: matrix.name == 'macOS'
        run: |
          echo "macOS export contents:"
          ls -la build/macos/
          if [ ! -f build/macos/CorditeWars.zip ]; then
            echo "ERROR: CorditeWars.zip not found after macOS export"
            exit 1
          fi

      - name: Extract macOS .app bundle from Godot zip
        if: matrix.name == 'macOS'
        run: |
          unzip -q build/macos/CorditeWars.zip -d build/macos/
          rm build/macos/CorditeWars.zip
          echo "macOS build contents after extraction:"
          ls -la build/macos/

      - name: Ad-hoc sign macOS .app bundle
        if: matrix.name == 'macOS'
        run: |
          APP_PATH=$(find build/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --deep --force --sign - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          else
            echo "WARNING: No .app bundle found to sign"
          fi

      - name: Verify iOS export
        if: matrix.name == 'iOS'
        run: |
          echo "iOS export contents:"
          ls -la build/ios/ 2>/dev/null || echo "WARNING: build/ios/ not found"
          XCODEPROJ=$(find build/ios -name "*.xcodeproj" -maxdepth 5 2>/dev/null | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: No .xcodeproj found after iOS export. Listing available files:"
            find build/ios -maxdepth 5 2>/dev/null | head -40 || true
            exit 1
          fi
          echo "iOS Xcode project: $XCODEPROJ"

      - name: Bundle iOS config into export
        if: matrix.name == 'iOS'
        run: |
          if [ -d build/ios ]; then
            cp versions/ios/ios-info.plist build/ios/ios-info.plist
            cp versions/ios/ios-export-options.plist build/ios/ios-export-options.plist
            echo "Bundled iOS config files into artifact."
          else
            echo "WARNING: build/ios/ not found — skipping config bundle."
          fi

      - name: Upload ${{ matrix.name }} export artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.build_dir }}/

  export-android:
    name: Export Platform (Android)
    runs-on: macos-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Install Android Gradle build template
        run: |
          set -euo pipefail
          GODOT_VERSION="${{ env.GODOT_VERSION }}"
          TEMPLATES_VERSION="$(echo "$GODOT_VERSION" | sed 's/-/./').mono"
          TPZ_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"

          echo "Downloading Godot ${GODOT_VERSION} export templates..."
          curl -L --fail -o /tmp/export_templates.tpz "$TPZ_URL"

          echo "Extracting export templates..."
          mkdir -p /tmp/godot_tpz/
          unzip -q /tmp/export_templates.tpz -d /tmp/godot_tpz/

          echo "Installing Android Gradle build template to android/build/..."
          mkdir -p android/build
          unzip -q /tmp/godot_tpz/templates/android_source.zip -d android/build/
          echo "$TEMPLATES_VERSION" > android/.build_version
          echo "$TEMPLATES_VERSION" > android/build/.build_version
          touch android/build/.gdignore

          echo "Android Gradle build template installed (${TEMPLATES_VERSION}):"
          ls android/build/ | head -20
          rm -rf /tmp/export_templates.tpz /tmp/godot_tpz/

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 \
            -deststoretype pkcs12

      - name: Prepare release keystore
        id: release_keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEYSTORE_ALIAS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_B64" ]; then
            rm -f "$GITHUB_WORKSPACE/release.keystore"
            echo "has_release_keystore=false" >> "$GITHUB_OUTPUT"
            echo "No release keystore secret set — Android builds will use debug signing."
          elif [ -z "$ANDROID_RELEASE_KEYSTORE_ALIAS" ] || [ -z "$ANDROID_RELEASE_KEYSTORE_PASSWORD" ]; then
            rm -f "$GITHUB_WORKSPACE/release.keystore"
            echo "has_release_keystore=false" >> "$GITHUB_OUTPUT"
            echo "Release keystore alias/password secret missing — Android builds will use debug signing."
          else
            echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"
            OLD_UMASK="$(umask)"
            umask 077
            STOREPASS_FILE="$(mktemp)"
            KEYPASS_FILE="$(mktemp)"
            VALIDATION_KEYSTORE="$(mktemp -p "$RUNNER_TEMP" release-keystore-validation-XXXXXX.p12)"
            umask "$OLD_UMASK"
            RELEASE_KEY_PASSWORD="${ANDROID_RELEASE_KEY_PASSWORD:-$ANDROID_RELEASE_KEYSTORE_PASSWORD}"
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_PASSWORD" > "$STOREPASS_FILE"
            printf '%s' "$RELEASE_KEY_PASSWORD" > "$KEYPASS_FILE"
            cleanup_password_files() {
              if [ -f "$STOREPASS_FILE" ]; then
                if command -v shred >/dev/null 2>&1; then
                  shred -u "$STOREPASS_FILE" || rm -f "$STOREPASS_FILE"
                else
                  rm -f "$STOREPASS_FILE"
                fi
              fi
              if [ -f "$KEYPASS_FILE" ]; then
                if command -v shred >/dev/null 2>&1; then
                  shred -u "$KEYPASS_FILE" || rm -f "$KEYPASS_FILE"
                else
                  rm -f "$KEYPASS_FILE"
                fi
              fi
              [ -f "$VALIDATION_KEYSTORE" ] && rm -f "$VALIDATION_KEYSTORE"
            }
            trap cleanup_password_files EXIT
            HAS_VALID_RELEASE_KEYSTORE=false
            if keytool -importkeystore \
              -srckeystore "$GITHUB_WORKSPACE/release.keystore" \
              -srcstorepass:file "$STOREPASS_FILE" \
              -srcalias "$ANDROID_RELEASE_KEYSTORE_ALIAS" \
              -srckeypass:file "$KEYPASS_FILE" \
              -destkeystore "$VALIDATION_KEYSTORE" \
              -deststoretype PKCS12 \
              -deststorepass:file "$STOREPASS_FILE" \
              -destkeypass:file "$KEYPASS_FILE" \
              -noprompt >/dev/null 2>&1; then
              HAS_VALID_RELEASE_KEYSTORE=true
            fi
            trap - EXIT
            cleanup_password_files
            if [ "$HAS_VALID_RELEASE_KEYSTORE" = "true" ]; then
              echo "has_release_keystore=true" >> "$GITHUB_OUTPUT"
              echo "Release keystore credentials validated — Android builds will be release-signed."
            else
              rm -f "$GITHUB_WORKSPACE/release.keystore"
              echo "has_release_keystore=false" >> "$GITHUB_OUTPUT"
              echo "Release keystore credentials are invalid for this keystore — Android builds will use debug signing."
            fi
          fi

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/shutdown_adb_on_exit = false\n' \
            "${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/Users/runner/Library/Android/sdk}}" \
            > "$HOME/Library/Application Support/Godot/editor_settings-4.tres"

      - name: Disable custom Gradle build for Android APK preset only
        run: |
          python - <<'PY'
          # Disable gradle_build/use_gradle_build only for the "Android" (APK) preset.
          # The "Android AAB" preset keeps Gradle enabled for Play Store submission.
          import re
          from pathlib import Path
          path = Path("export_presets.cfg")
          lines = path.read_text().splitlines(keepends=True)
          out = []
          in_preset_header = False
          in_android_apk_options = False
          current_preset_name = None
          modified = 0
          for line in lines:
              stripped = line.strip()
              if re.match(r'\[preset\.\d+\]$', stripped):
                  in_preset_header = True
                  in_android_apk_options = False
                  current_preset_name = None
                  out.append(line)
                  continue
              if re.match(r'\[preset\.\d+\.options\]$', stripped):
                  in_preset_header = False
                  in_android_apk_options = (current_preset_name == "Android")
                  out.append(line)
                  continue
              if in_preset_header:
                  m = re.match(r'name="(.+)"', stripped)
                  if m:
                      current_preset_name = m.group(1)
              if in_android_apk_options and stripped == 'gradle_build/use_gradle_build=true':
                  out.append(
                      line.replace(
                          'gradle_build/use_gradle_build=true',
                          'gradle_build/use_gradle_build=false'
                      )
                  )
                  modified += 1
                  continue
              out.append(line)
          if modified == 0:
              raise SystemExit(
                  "Expected gradle_build/use_gradle_build=true in the Android APK preset; "
                  "check export_presets.cfg."
              )
          path.write_text(''.join(out))
          print(f"Disabled Gradle build in {modified} Android APK preset option(s).")
          PY

      - name: Install Godot editor and export templates
        run: |
          set -euo pipefail
          GODOT_VERSION="${{ env.GODOT_VERSION }}"
          GODOT_ZIP="$RUNNER_TEMP/godot-mono.zip"
          TEMPLATES_TPZ="$RUNNER_TEMP/export-templates.tpz"
          GODOT_EXTRACT_DIR="$RUNNER_TEMP/godot-extract"
          TEMPLATES_EXTRACT_DIR="$RUNNER_TEMP/templates-extract"
          GODOT_APP_MATCHES_FILE=""
          TEMPLATES_MATCHES_FILE=""
          cleanup_temp_match_files() {
            [ -n "$GODOT_APP_MATCHES_FILE" ] && rm -f "$GODOT_APP_MATCHES_FILE"
            [ -n "$TEMPLATES_MATCHES_FILE" ] && rm -f "$TEMPLATES_MATCHES_FILE"
          }
          trap cleanup_temp_match_files EXIT

          rm -rf "$GODOT_EXTRACT_DIR" "$TEMPLATES_EXTRACT_DIR"
          mkdir -p "$GODOT_EXTRACT_DIR" "$TEMPLATES_EXTRACT_DIR"

          curl -L --fail \
            -o "$GODOT_ZIP" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_macos.universal.zip"
          unzip -q "$GODOT_ZIP" -d "$GODOT_EXTRACT_DIR"

          GODOT_APP_MATCHES_FILE="$(mktemp)"
          find "$GODOT_EXTRACT_DIR" -type d -name '*.app' > "$GODOT_APP_MATCHES_FILE"
          GODOT_APP_COUNT="$(wc -l < "$GODOT_APP_MATCHES_FILE" | tr -d ' ')"
          if [ "$GODOT_APP_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 .app bundle after extraction, found $GODOT_APP_COUNT."
            cat "$GODOT_APP_MATCHES_FILE"
            exit 1
          fi
          GODOT_APP_PATH="$(sed -n '1p' "$GODOT_APP_MATCHES_FILE")"
          xattr -r -d com.apple.quarantine "$GODOT_APP_PATH" 2>/dev/null || true
          GODOT_BIN="$GODOT_APP_PATH/Contents/MacOS/Godot"
          if [ ! -f "$GODOT_BIN" ]; then
            GODOT_BIN=$(find "$GODOT_APP_PATH/Contents/MacOS" -maxdepth 1 -type f | head -1)
          fi
          if [ -z "$GODOT_BIN" ] || [ ! -f "$GODOT_BIN" ]; then
            echo "ERROR: Godot binary not found inside $GODOT_APP_PATH/Contents/MacOS/"
            ls -la "$GODOT_APP_PATH/Contents/MacOS/" 2>/dev/null || true
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          curl -L --fail \
            -o "$TEMPLATES_TPZ" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"
          unzip -q "$TEMPLATES_TPZ" -d "$TEMPLATES_EXTRACT_DIR"

          TEMPLATES_MATCHES_FILE="$(mktemp)"
          find "$TEMPLATES_EXTRACT_DIR" -type d -name templates > "$TEMPLATES_MATCHES_FILE"
          TEMPLATES_COUNT="$(wc -l < "$TEMPLATES_MATCHES_FILE" | tr -d ' ')"
          if [ "$TEMPLATES_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 templates directory in export template archive, found $TEMPLATES_COUNT."
            cat "$TEMPLATES_MATCHES_FILE"
            exit 1
          fi
          TEMPLATES_SRC_DIR="$(sed -n '1p' "$TEMPLATES_MATCHES_FILE")"

          TEMPLATES_VERSION="$(echo "$GODOT_VERSION" | sed 's/-/./').mono"
          TEMPLATES_DEST_DIR="$HOME/Library/Application Support/Godot/export_templates/$TEMPLATES_VERSION"
          mkdir -p "$TEMPLATES_DEST_DIR"
          cp -R "$TEMPLATES_SRC_DIR/." "$TEMPLATES_DEST_DIR/"

      - name: Export Android (APK + AAB)
        run: |
          set -euo pipefail
          mkdir -p build/android
          HAS_RELEASE="${{ steps.release_keystore.outputs.has_release_keystore }}"
          IFS=',' read -ra PRESETS <<< "Android,Android AAB"
          for PRESET in "${PRESETS[@]}"; do
            PRESET_TRIMMED="$(echo "$PRESET" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            if [ "$HAS_RELEASE" != "true" ] && [ "$PRESET_TRIMMED" = "Android" ]; then
              # APK preset without a release keystore: export-debug uses the debug
              # keystore directly and skips release-keystore validation entirely.
              "$GODOT_BIN" --headless --path ./ --export-debug "$PRESET_TRIMMED"
            else
              "$GODOT_BIN" --headless --path ./ --export-release "$PRESET_TRIMMED"
            fi
          done
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
          # When there is no release keystore the AAB preset (package/signed=true)
          # still requires a valid release keystore entry; fall back to the debug
          # keystore using its absolute path so Godot can locate the file.
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ steps.release_keystore.outputs.has_release_keystore == 'true' && format('{0}/release.keystore', github.workspace) || format('{0}/debug.keystore', github.workspace) }}
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ steps.release_keystore.outputs.has_release_keystore == 'true' && secrets.ANDROID_RELEASE_KEYSTORE_ALIAS || 'androiddebugkey' }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ steps.release_keystore.outputs.has_release_keystore == 'true' && (secrets.ANDROID_RELEASE_KEY_PASSWORD || secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD) || 'android' }}

      - name: Flatten Android export outputs
        run: |
          if [ -d "build/android/Android" ]; then
            cp -a "build/android/Android/." "build/android/"
            rm -rf "build/android/Android"
            echo "Flattened build/android/Android/ → build/android/"
          fi
          if [ -d "build/android/Android AAB" ]; then
            cp -a "build/android/Android AAB/." "build/android/"
            rm -rf "build/android/Android AAB"
            echo "Flattened build/android/Android AAB/ → build/android/"
          fi

      - name: Verify Android exports
        run: |
          echo "Android build contents:"
          ls -la build/android/
          if [ ! -f build/android/CorditeWars.apk ]; then
            echo "ERROR: CorditeWars.apk not found"
            exit 1
          fi
          if [ ! -f build/android/CorditeWars.aab ]; then
            echo "ERROR: CorditeWars.aab not found"
            exit 1
          fi

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Android
          path: build/android/CorditeWars.apk

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Android-AAB
          path: build/android/CorditeWars.aab

  export-all:
    name: Export Platform (All Targets)
    runs-on: ubuntu-latest
    needs:
      - export-platform
      - export-android
    steps:
      - name: Confirm all target exports completed
        run: echo "All target-specific export jobs completed successfully."

  # ─────────────────────────────────────────────────────────────────────────────
  # 1b. Package Windows EXE — Inno Setup installer (reliable, always runs)
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows-exe:
    name: Windows EXE Installer
    runs-on: windows-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export files
        shell: powershell
        run: |
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }

      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path dist\windows | Out-Null

      - name: Install Inno Setup 6
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build EXE installer (Inno Setup)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ needs.resolve-version.outputs.app_version }} `
            versions\windows\inno-setup.iss
          if (-not (Test-Path "dist\windows\CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe")) {
            throw "Inno Setup did not produce CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe"
          }
          Write-Host "EXE installer: dist\windows\CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe"

      - name: Upload EXE installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Windows-Setup-EXE
          path: dist/windows/CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # 1c. Package Windows MSI — WiX installer (independent of EXE build)
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows-msi:
    name: Windows MSI Installer
    runs-on: windows-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export files
        shell: powershell
        run: |
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }

      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path dist\windows | Out-Null

      - name: Install WiX Toolset v7
        shell: powershell
        run: dotnet tool install --global wix --version 7.0.0

      - name: Add WiX UI extension
        shell: powershell
        env:
          WIX_EULA_ACCEPT: "1"
        run: wix extension add --global WixToolset.UI.wixext/7.0.0

      - name: Build MSI installer (WiX)
        shell: powershell
        env:
          WIX_EULA_ACCEPT: "1"
        run: |
          $ErrorActionPreference = "Stop"
          wix build versions\windows\CorditeWars.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d BuildDir=build\windows `
            -d AppVersion=${{ needs.resolve-version.outputs.app_version }} `
            -out dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi
          if (-not (Test-Path "dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi")) {
            throw "WiX did not produce CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi"
          }
          Write-Host "MSI installer: dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi"

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Windows-MSI
          path: dist/windows/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Package Linux Snap (runs after export-all)
  # ─────────────────────────────────────────────────────────────────────────────
  package-linux-snap:
    name: Linux Snap Package
    runs-on: ubuntu-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Linux
          path: build/linux

      - name: Normalize Linux binary name
        run: |
          # Godot exports as CorditeWars.x86_64; Snap expects CorditeWars
          if [ -f build/linux/CorditeWars.x86_64 ] && [ ! -f build/linux/CorditeWars ]; then
            cp build/linux/CorditeWars.x86_64 build/linux/CorditeWars
          fi
          chmod +x build/linux/CorditeWars
          echo "Linux build contents:"
          ls -la build/linux/

      - name: Inject app version into snapcraft.yaml
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.app_version }}"
          # Replace the hardcoded version line with the resolved app version so that
          # the published Snap package version always matches versions/shared/version.json.
          sed -i "s/^version: .*/version: '${APP_VERSION}'/" versions/linux/snapcraft.yaml
          echo "snapcraft.yaml version set to: ${APP_VERSION}"
          grep "^version:" versions/linux/snapcraft.yaml

      - name: Stage Linux export for Snapcraft
        run: |
          mkdir -p versions/linux/build/linux
          cp -R build/linux/. versions/linux/build/linux/
          echo "Snapcraft staged source contents:"
          ls -la versions/linux/build/linux/

      - name: Build Snap
        id: snapcraft
        uses: snapcore/action-build@v1.3.0
        with:
          path: versions/linux

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Linux-Snap
          path: ${{ steps.snapcraft.outputs.snap }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2b. Package Linux DEB
  # ─────────────────────────────────────────────────────────────────────────────
  package-linux-deb:
    name: Linux DEB Package
    runs-on: ubuntu-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Linux
          path: build/linux

      - name: Install packaging tools
        run: sudo apt-get install -y librsvg2-bin

      - name: Build DEB package
        run: |
          set -euo pipefail
          APP_VERSION="${{ needs.resolve-version.outputs.app_version }}"
          PKG_DIR="cordite-wars_${APP_VERSION}_amd64"

          # ── Directory skeleton ──────────────────────────────────────────────
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt/cordite-wars"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/512x512/apps"
          mkdir -p "${PKG_DIR}/usr/bin"

          # ── Game binary ─────────────────────────────────────────────────────
          if [ -f build/linux/CorditeWars.x86_64 ]; then
            cp build/linux/CorditeWars.x86_64 "${PKG_DIR}/opt/cordite-wars/CorditeWars"
          else
            cp build/linux/CorditeWars "${PKG_DIR}/opt/cordite-wars/CorditeWars"
          fi
          chmod +x "${PKG_DIR}/opt/cordite-wars/CorditeWars"

          # ── Game data files ─────────────────────────────────────────────────
          [ -f build/linux/CorditeWars.pck ] && cp build/linux/CorditeWars.pck "${PKG_DIR}/opt/cordite-wars/"
          [ -d build/linux/GodotSharp ]       && cp -rp build/linux/GodotSharp "${PKG_DIR}/opt/cordite-wars/"
          find build/linux -maxdepth 1 -name "data_*" -type d | while read -r dir; do
            cp -rp "$dir" "${PKG_DIR}/opt/cordite-wars/"
          done

          # ── Launcher symlink ────────────────────────────────────────────────
          ln -s /opt/cordite-wars/CorditeWars "${PKG_DIR}/usr/bin/cordite-wars"

          # ── Desktop entry (patch Icon= to freedesktop standard path) ────────
          sed 's|Icon=.*|Icon=cordite-wars|' versions/linux/cordite-wars.desktop \
            > "${PKG_DIR}/usr/share/applications/cordite-wars.desktop"

          # ── Icon (convert SVG → PNG for the hicolor icon theme) ─────────────
          if command -v rsvg-convert &>/dev/null && [ -f assets/icons/icon.svg ]; then
            rsvg-convert -w 512 -h 512 assets/icons/icon.svg \
              -o "${PKG_DIR}/usr/share/icons/hicolor/512x512/apps/cordite-wars.png"
          fi

          # ── DEBIAN/control: inject version + computed Installed-Size ─────────
          sed "s/^Version: .*/Version: ${APP_VERSION}/" versions/linux/debian/control \
            > "${PKG_DIR}/DEBIAN/control"
          INSTALLED_KB=$(du -sk "${PKG_DIR}/opt" | awk '{print $1}')
          sed -i "s/^Installed-Size: .*/Installed-Size: ${INSTALLED_KB}/" "${PKG_DIR}/DEBIAN/control"

          # ── Build ────────────────────────────────────────────────────────────
          mkdir -p dist/linux
          dpkg-deb --build --root-owner-group "${PKG_DIR}" \
            "dist/linux/CorditeWars_${APP_VERSION}_amd64.deb"
          echo "Built: dist/linux/CorditeWars_${APP_VERSION}_amd64.deb"
          ls -lh dist/linux/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Linux-DEB
          path: dist/linux/CorditeWars_${{ needs.resolve-version.outputs.app_version }}_amd64.deb

  # ─────────────────────────────────────────────────────────────────────────────
  # 2c. Package Linux Flatpak bundle
  # ─────────────────────────────────────────────────────────────────────────────
  package-linux-flatpak:
    name: Linux Flatpak Bundle
    runs-on: ubuntu-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Linux
          path: build/linux

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Stage game files for flatpak-builder
        run: |
          # flatpak-builder resolves "path: build/linux" relative to the manifest
          # directory (versions/linux/flatpak/), so we stage everything there.
          mkdir -p versions/linux/flatpak/build/linux
          cp -R build/linux/. versions/linux/flatpak/build/linux/

          # Normalise the binary name (Godot exports as CorditeWars.x86_64)
          if [ -f versions/linux/flatpak/build/linux/CorditeWars.x86_64 ] && \
             [ ! -f versions/linux/flatpak/build/linux/CorditeWars ]; then
            cp versions/linux/flatpak/build/linux/CorditeWars.x86_64 \
               versions/linux/flatpak/build/linux/CorditeWars
          fi
          chmod +x versions/linux/flatpak/build/linux/CorditeWars

          # Copy desktop entry (rename to app-ID form for Flathub validation)
          sed 's|Exec=.*|Exec=CorditeWars|; s|Icon=.*|Icon=com.koshkikode.CorditeWars|' \
            versions/linux/cordite-wars.desktop \
            > versions/linux/flatpak/build/linux/com.koshkikode.CorditeWars.desktop

          # Copy icon (SVG) — Flatpak installs it to hicolor/scalable/apps/
          if [ -f assets/icons/icon.svg ]; then
            cp assets/icons/icon.svg \
              versions/linux/flatpak/build/linux/com.koshkikode.CorditeWars.svg
          fi

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: CorditeWars_${{ needs.resolve-version.outputs.app_version }}.flatpak
          manifest-path: versions/linux/flatpak/com.koshkikode.CorditeWars.yml
          cache-key: flatpak-builder-${{ hashFiles('versions/linux/flatpak/com.koshkikode.CorditeWars.yml') }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Linux-Flatpak
          path: CorditeWars_${{ needs.resolve-version.outputs.app_version }}.flatpak

  # ─────────────────────────────────────────────────────────────────────────────
  # 1d. Package Windows MSIX
  #     Self-signed dev cert in CI (sideload-ready).
  #     For Store distribution add WINDOWS_CERT_B64 / WINDOWS_CERT_PASSWORD
  #     secrets; the job will use them automatically.
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows-msix:
    name: Windows MSIX Package
    runs-on: windows-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export
        shell: powershell
        run: |
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows

      - name: Patch version into AppxManifest.xml
        shell: powershell
        run: |
          $semver   = "${{ needs.resolve-version.outputs.app_version }}"
          $msixVer  = "$semver.0"   # MSIX requires 4-part version
          $path     = "versions\windows\AppxManifest.xml"
          $xml      = Get-Content $path -Raw
          $xml      = $xml -replace 'Version="[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+"', "Version=`"$msixVer`""
          Set-Content $path $xml -Encoding UTF8
          Write-Host "AppxManifest.xml version set to: $msixVer"

      - name: Generate placeholder MSIX icon assets
        shell: powershell
        run: |
          # Creates minimal solid-colour PNG placeholders.
          # Replace Assets\ with real game icons before Store submission.
          Add-Type -AssemblyName System.Drawing
          function New-SolidPng($W, $H, $Dest) {
            $bmp = New-Object System.Drawing.Bitmap($W, $H)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(255, 16, 32, 64))
            $g.Dispose()
            New-Item -Force -ItemType Directory -Path (Split-Path $Dest) | Out-Null
            $bmp.Save($Dest, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
          }
          New-SolidPng  44  44  "msix_assets\Square44x44Logo.png"
          New-SolidPng 150 150  "msix_assets\Square150x150Logo.png"
          New-SolidPng  50  50  "msix_assets\StoreLogo.png"
          Write-Host "MSIX icon assets created."

      - name: Stage MSIX package contents
        shell: powershell
        run: |
          New-Item -Force -ItemType Directory -Path msix_stage | Out-Null
          Copy-Item -Recurse "build\windows\*" msix_stage\
          Copy-Item versions\windows\AppxManifest.xml msix_stage\AppxManifest.xml
          New-Item -Force -ItemType Directory -Path "msix_stage\Assets" | Out-Null
          Copy-Item "msix_assets\*" "msix_stage\Assets\"
          Write-Host "MSIX stage contents:"
          Get-ChildItem msix_stage -Recurse | Select-Object FullName

      - name: Locate makeappx.exe
        id: sdk_tools
        shell: powershell
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "makeappx.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found - Windows SDK missing?" }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found - Windows SDK missing?" }
          "MAKEAPPX=$($makeappx.FullName)" | Out-File -Append $env:GITHUB_ENV
          "SIGNTOOL=$($signtool.FullName)"  | Out-File -Append $env:GITHUB_ENV
          Write-Host "makeappx: $($makeappx.FullName)"
          Write-Host "signtool:  $($signtool.FullName)"

      - name: Build MSIX package
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.resolve-version.outputs.app_version }}"
          New-Item -Force -ItemType Directory -Path dist\windows | Out-Null
          & $env:MAKEAPPX pack /d msix_stage /p "dist\windows\CorditeWars_${version}.msix" /overwrite
          if (-not (Test-Path "dist\windows\CorditeWars_${version}.msix")) {
            throw "makeappx did not produce the MSIX package."
          }
          Write-Host "MSIX package: dist\windows\CorditeWars_${version}.msix"

      - name: Sign MSIX (production cert or self-signed dev cert)
        shell: powershell
        env:
          WINDOWS_CERT_B64: ${{ secrets.WINDOWS_CERT_B64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.resolve-version.outputs.app_version }}"
          $msix    = "dist\windows\CorditeWars_${version}.msix"

          if ($env:WINDOWS_CERT_B64) {
            # Use the production code-signing certificate from secrets.
            Write-Host "Using production signing certificate from secret."
            $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_B64)
            [IO.File]::WriteAllBytes("signing.pfx", $certBytes)
            & $env:SIGNTOOL sign /fd SHA256 /p "$env:WINDOWS_CERT_PASSWORD" /f signing.pfx $msix
            Remove-Item signing.pfx -Force
          } else {
            # Generate a temporary self-signed cert for CI / developer sideloading.
            # The Publisher CN in AppxManifest.xml must match this subject.
            Write-Host "No WINDOWS_CERT_B64 secret — generating self-signed dev cert."
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject "CN=CorditeWarsTeam" `
              -KeyUsage DigitalSignature `
              -FriendlyName "Cordite Wars Dev Cert" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
            & $env:SIGNTOOL sign /fd SHA256 /sha1 $cert.Thumbprint $msix
            Write-Host "MSIX self-signed (dev cert — sideload only)."
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-Windows-MSIX
          path: dist/windows/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msix

  #     Code signing and notarization run only when Apple secrets are set.
  # ─────────────────────────────────────────────────────────────────────────────
  package-macos:
    name: macOS DMG Package
    runs-on: macos-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download macOS export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-macOS-Export
          path: build/macos

      - name: Check Apple signing secrets
        env:
          _APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          echo "HAS_APPLE_DEV_ID=${{ secrets.APPLE_DEV_ID != '' }}" >> "$GITHUB_ENV"
          echo "HAS_APPLE_ID=${{ secrets.APPLE_ID != '' }}" >> "$GITHUB_ENV"
          echo "HAS_AC_PASSWORD=${{ secrets.AC_PASSWORD != '' }}" >> "$GITHUB_ENV"

      - name: Locate .app bundle
        run: |
          mkdir -p dist/macos
          echo "Downloaded macOS build contents:"
          ls -la build/macos/
          # The .app bundle is now extracted directly into the artifact (no zip).
          APP_PATH=$(find build/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/macos/"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app bundle: $APP_PATH"

      - name: Code sign app bundle
        if: env.HAS_APPLE_DEV_ID == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: |
          codesign --deep --force --options runtime \
            --entitlements versions/macos/entitlements.plist \
            --sign "$APPLE_DEV_ID" \
            --timestamp \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "App bundle signed with: $APPLE_DEV_ID"

      - name: Ad-hoc sign app bundle (no Apple Developer ID)
        if: env.HAS_APPLE_DEV_ID == 'false'
        run: |
          # Ad-hoc signing (-) satisfies macOS's minimum code-signature requirement,
          # preventing the "app is damaged" Gatekeeper error for unsigned binaries.
          # Users will still need to right-click → Open the first time they launch
          # the app (until it is notarized with a real Apple Developer certificate).
          codesign --deep --force \
            --sign - \
            "$APP_PATH"
          echo "App bundle ad-hoc signed."

      - name: Create DMG
        run: |
          DMG_PATH="dist/macos/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.dmg"
          # Stage the .app in a clean directory so hdiutil places the bundle
          # (not its internals) at the root of the DMG volume.
          STAGING_DIR="dist/macos/staging"
          mkdir -p "$STAGING_DIR"
          # Use ditto (not cp -R) so app bundle metadata and symlinks are
          # preserved exactly; this prevents broken signatures/app bundles
          # that can trigger "app is damaged" on downloaded DMGs.
          STAGED_APP_PATH="$STAGING_DIR/$(basename "$APP_PATH")"
          ditto "$APP_PATH" "$STAGED_APP_PATH"
          codesign --verify --deep --verbose=2 "$STAGED_APP_PATH"
          hdiutil create \
            -volname "Cordite Wars" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "Created DMG: $DMG_PATH"

      - name: Sign DMG
        if: env.HAS_APPLE_DEV_ID == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: codesign --sign "$APPLE_DEV_ID" --timestamp "$DMG_PATH"

      - name: Ad-hoc sign DMG (no Apple Developer ID)
        if: env.HAS_APPLE_DEV_ID == 'false'
        run: codesign --force --sign - "$DMG_PATH"

      - name: Notarize and staple DMG
        if: env.HAS_APPLE_DEV_ID == 'true' && env.HAS_APPLE_ID == 'true' && env.HAS_AC_PASSWORD == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "DMG notarized and stapled."

      - name: Verify DMG integrity
        run: |
          hdiutil verify "$DMG_PATH"
          MOUNT_POINT="$(mktemp -d)"
          ATTACHED=0
          if hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -readonly; then
            ATTACHED=1
            find "$MOUNT_POINT" -maxdepth 2 -name "*.app" -print
          fi
          if [ "$ATTACHED" -eq 1 ]; then
            hdiutil detach "$MOUNT_POINT" || true
          fi

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-macOS-DMG
          path: dist/macos/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.dmg

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Package iOS IPA
  #    Builds a signed IPA from the Godot-exported Xcode project when
  #    IOS_P12_CERTIFICATE, IOS_PROVISIONING_PROFILE, IOS_P12_PASSWORD, and
  #    APPLE_TEAM_ID secrets are all set.
  #    Falls back to a versioned zip of the Xcode project when any secret is
  #    absent, so the release still has a downloadable iOS artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  package-ios:
    name: iOS IPA
    runs-on: macos-latest
    needs: [export-all, resolve-version]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download iOS Xcode project
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-iOS-iPadOS-Handoff
          path: build/ios

      - name: Check iOS signing secrets
        id: ios_secrets
        env:
          _P12:     ${{ secrets.IOS_P12_CERTIFICATE }}
          _PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          _PASS:    ${{ secrets.IOS_P12_PASSWORD }}
          _TEAM:    ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_P12" ] && [ -n "$_PROFILE" ] && [ -n "$_PASS" ] && [ -n "$_TEAM" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
            echo "All iOS signing secrets present — will build IPA."
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "One or more iOS signing secrets missing (IOS_P12_CERTIFICATE, IOS_PROVISIONING_PROFILE, IOS_P12_PASSWORD, APPLE_TEAM_ID)."
            echo "Packaging Xcode project as zip instead of building IPA."
          fi

      # ── Signed IPA path ──────────────────────────────────────────────────────

      - name: Import P12 certificate
        if: steps.ios_secrets.outputs.has_signing == 'true'
        env:
          IOS_P12_CERTIFICATE: ${{ secrets.IOS_P12_CERTIFICATE }}
          IOS_P12_PASSWORD:    ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$IOS_P12_CERTIFICATE" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "ci-keychain" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci-keychain" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/signing.p12 -k build.keychain \
            -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "ci-keychain" build.keychain
          rm /tmp/signing.p12
          echo "P12 certificate imported to build keychain."

      - name: Install provisioning profile
        if: steps.ios_secrets.outputs.has_signing == 'true'
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision \
            | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"${PROFILE_UUID}.mobileprovision"
          rm /tmp/profile.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "Provisioning profile installed (UUID: $PROFILE_UUID)."

      - name: Patch export options plist
        if: steps.ios_secrets.outputs.has_signing == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          python3 - <<'PY'
          import os, re
          from pathlib import Path
          path = Path("versions/ios/ios-export-options.plist")
          content = path.read_text()
          # Expand the $(APPLE_TEAM_ID) placeholder
          content = content.replace("$(APPLE_TEAM_ID)", os.environ["APPLE_TEAM_ID"])
          # Switch to manual signing so CI can supply the exact profile UUID
          content = re.sub(
              r'(<key>signingStyle</key>\s*<string>)[^<]*(</string>)',
              r'\g<1>manual\g<2>',
              content,
          )
          path.write_text(content)
          print("Patched versions/ios/ios-export-options.plist")
          PY

      - name: Find Xcode project and scheme
        id: xcodeproj
        run: |
          XCODEPROJ=$(find build/ios -name "*.xcodeproj" -maxdepth 4 | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: No .xcodeproj found in build/ios/"
            ls -la build/ios/ || true
            exit 1
          fi
          SCHEME=$(basename "$XCODEPROJ" .xcodeproj)
          echo "XCODEPROJ=$XCODEPROJ" >> "$GITHUB_ENV"
          echo "SCHEME=$SCHEME"       >> "$GITHUB_ENV"
          echo "Found: $XCODEPROJ  (scheme: $SCHEME)"

      - name: Build Xcode archive
        if: steps.ios_secrets.outputs.has_signing == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme  "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/CorditeWars.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            | cat
          echo "Xcode archive created at /tmp/CorditeWars.xcarchive"

      - name: Export IPA from archive
        if: steps.ios_secrets.outputs.has_signing == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve-version.outputs.app_version }}"
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/CorditeWars.xcarchive \
            -exportPath  build/ipa \
            -exportOptionsPlist versions/ios/ios-export-options.plist \
            | cat
          # Rename to include version
          IPA=$(find build/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No .ipa found after xcodebuild -exportArchive"
            ls -la build/ipa/ || true
            exit 1
          fi
          mv "$IPA" "build/ipa/CorditeWars_${VERSION}_ios.ipa"
          echo "IPA: build/ipa/CorditeWars_${VERSION}_ios.ipa"

      - name: Upload iOS IPA artifact
        if: steps.ios_secrets.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-iOS-IPA
          path: build/ipa/CorditeWars_${{ needs.resolve-version.outputs.app_version }}_ios.ipa

      # ── Fallback: Xcode project zip ──────────────────────────────────────────

      - name: Package Xcode project as zip (fallback)
        if: steps.ios_secrets.outputs.has_signing != 'true'
        run: |
          VERSION="${{ needs.resolve-version.outputs.app_version }}"
          mkdir -p build/ios-zip
          cd build/ios
          zip -r "../ios-zip/CorditeWars_${VERSION}_ios_xcode.zip" .
          echo "Packaged Xcode project: CorditeWars_${VERSION}_ios_xcode.zip"

      - name: Upload iOS Xcode zip artifact (fallback)
        if: steps.ios_secrets.outputs.has_signing != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: CorditeWars-iOS-IPA
          path: build/ios-zip/CorditeWars_${{ needs.resolve-version.outputs.app_version }}_ios_xcode.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # 6a. Headless smoke test — Linux
  #     Launch the Linux export for 60 physics frames (2 s at 30 Hz) and assert
  #     a clean exit.  Catches crashes at startup before any artifact is published.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-linux:
    name: Headless Smoke Test (Linux)
    runs-on: ubuntu-latest
    needs: export-all

    steps:
      - name: Download Linux export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Linux
          path: smoke/

      - name: Make binary executable
        run: chmod +x smoke/CorditeWars.x86_64

      - name: Install virtual framebuffer
        run: sudo apt-get install -y xvfb

      - name: Run headless smoke test
        run: |
          set -euo pipefail
          echo "--- Linux export contents ---"
          ls -la smoke/

          # Run the game for 60 physics frames (2 s at 30 Hz), then exit.
          # xvfb-run provides a virtual display so the rendering driver can
          # initialise without a real monitor.  Exit code 0 means the engine
          # started, ran its main loop, and shut down cleanly.
          xvfb-run -a smoke/CorditeWars.x86_64 --headless --quit-after 60
          echo "Smoke test passed — game started and exited cleanly."

  # ─────────────────────────────────────────────────────────────────────────────
  # 6b. Headless smoke test — Windows
  #     Launch the Windows export for 60 physics frames on a real Windows runner.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-windows:
    name: Headless Smoke Test (Windows)
    runs-on: windows-latest
    needs: export-all

    steps:
      - name: Download Windows export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-Windows
          path: smoke/

      - name: Verify export and run headless smoke test
        shell: powershell
        run: |
          Write-Host "--- Windows export contents ---"
          Get-ChildItem smoke\
          if (-not (Test-Path "smoke\CorditeWars.exe")) {
            throw "CorditeWars.exe not found in smoke/ artifact."
          }

          # --headless tells Godot to skip display/audio initialisation.
          # --quit-after 60 stops the engine after 60 physics frames (≈2 s).
          $proc = Start-Process -FilePath "smoke\CorditeWars.exe" `
            -ArgumentList "--headless", "--quit-after", "60" `
            -NoNewWindow -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "Smoke test FAILED -- exit code $($proc.ExitCode)"
          }
          Write-Host "Smoke test passed -- game started and exited cleanly."

  # ─────────────────────────────────────────────────────────────────────────────
  # 6c. Headless smoke test — macOS
  #     Unzip the macOS .app bundle and run it headlessly on a real macOS runner.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-macos:
    name: Headless Smoke Test (macOS)
    runs-on: macos-latest
    needs: export-all

    steps:
      - name: Download macOS export
        uses: actions/download-artifact@v8
        with:
          name: CorditeWars-macOS-Export
          path: smoke/

      - name: Locate game binary
        id: find_binary
        run: |
          # The .app bundle is now extracted directly in the artifact (no zip).
          APP=$(find smoke/ -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in smoke/"
            exit 1
          fi
          # The main executable inside a Godot .app bundle is always named after
          # the project (CorditeWars). Fall back to the first file only if it
          # cannot be found under the expected name.
          BINARY="$APP/Contents/MacOS/CorditeWars"
          if [ ! -f "$BINARY" ]; then
            BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          fi
          if [ -z "$BINARY" ]; then
            echo "ERROR: No executable found inside .app bundle at $APP/Contents/MacOS"
            exit 1
          fi
          chmod +x "$BINARY"
          echo "GAME_BINARY=$BINARY" >> "$GITHUB_ENV"
          echo "Found game binary: $BINARY"

      - name: Run headless smoke test
        run: |
          set -euo pipefail
          # --headless skips display/audio; --quit-after 60 exits after 60 frames.
          "$GAME_BINARY" --headless --quit-after 60
          echo "Smoke test passed — game started and exited cleanly."
