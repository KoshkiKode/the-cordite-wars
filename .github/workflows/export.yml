name: "Export Godot Project"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:

env:
  GODOT_VERSION: "4.6.2-stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Validate project — confirm the boot scene and all platform presets exist
  #    before spending runner minutes on exports.
  # ─────────────────────────────────────────────────────────────────────────────
  validate-project:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check boot scene and required project files
        run: |
          set -euo pipefail
          ERRORS=0

          check_file() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      $1"
            fi
          }

          # Core Godot project files
          check_file project.godot
          check_file export_presets.cfg
          check_file scenes/Core/Boot.tscn
          check_file scenes/UI/MainMenu.tscn
          check_file scenes/UI/SplashScreen.tscn

          # Autoload singletons
          check_file src/Core/GameManager.cs
          check_file src/Core/EventBus.cs
          check_file src/Systems/Audio/AudioManager.cs

          # C# project
          check_file CorditeWars.csproj

          # Platform packaging assets
          check_file versions/windows/inno-setup.iss
          check_file versions/windows/CorditeWars.wxs
          check_file versions/linux/snapcraft.yaml
          check_file versions/macos/entitlements.plist
          check_file versions/ios/ios-info.plist
          check_file versions/ios/ios-export-options.plist

          # Confirm Boot.tscn is the main scene
          if ! grep -q 'run/main_scene.*Boot\.tscn' project.godot; then
            echo "FAIL: project.godot does not set run/main_scene to Boot.tscn"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK:      project.godot -> Boot.tscn"
          fi

          # Confirm all required export presets are present
          for PRESET in "Windows Desktop" "Linux/X11" "Android" "Android AAB" "iOS" "macOS"; do
            if ! grep -q "name=\"$PRESET\"" export_presets.cfg; then
              echo "FAIL: export_presets.cfg missing preset: $PRESET"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      export preset: $PRESET"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Project validation FAILED with $ERRORS error(s)."
            exit 1
          fi
          echo ""
          echo "Project validation passed."

  # ─────────────────────────────────────────────────────────────────────────────
  # 0b. Resolve application version from canonical shared version source.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve-version:
    name: Resolve App Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.read_version.outputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from versions/shared/version.json
        id: read_version
        run: |
          set -euo pipefail
          APP_VERSION="$(python - <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path("versions/shared/version.json")
          if not path.exists():
              print("ERROR: versions/shared/version.json not found in repository root", file=sys.stderr)
              raise SystemExit(1)
          try:
              data = json.loads(path.read_text())
              major = int(data["major"])
              minor = int(data["minor"])
              patch = int(data["patch"])
          except (json.JSONDecodeError, KeyError, TypeError, ValueError) as exc:
              print(f"ERROR: Invalid versions/shared/version.json: {exc}", file=sys.stderr)
              raise SystemExit(1)
          print(f"{major}.{minor}.{patch}")
          PY
          )"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: $APP_VERSION"

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Export all platforms in one job on a macOS runner:
  #    Windows Desktop, Linux/X11, Android APK, Android AAB, iOS, macOS
  #    iOS uses export_debug:true to avoid an xcodebuild signing conflict;
  #    all other platforms use export_debug:false.
  # ─────────────────────────────────────────────────────────────────────────────
  export-all:
    name: Export All (Windows / Linux / Android / iOS / macOS)
    runs-on: macos-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Install Android Gradle build template
        run: |
          set -euo pipefail
          GODOT_VERSION="${{ env.GODOT_VERSION }}"
          TEMPLATES_VERSION="$(echo "$GODOT_VERSION" | sed 's/-/./').mono"
          TPZ_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"

          echo "Downloading Godot ${GODOT_VERSION} export templates..."
          curl -L --fail -o /tmp/export_templates.tpz "$TPZ_URL"

          echo "Extracting export templates..."
          mkdir -p /tmp/godot_tpz/
          unzip -q /tmp/export_templates.tpz -d /tmp/godot_tpz/

          echo "Installing Android Gradle build template to android/build/..."
          mkdir -p android/build
          unzip -q /tmp/godot_tpz/templates/android_source.zip -d android/build/
          echo "$TEMPLATES_VERSION" > android/.build_version
          echo "$TEMPLATES_VERSION" > android/build/.build_version
          touch android/build/.gdignore

          echo "Android Gradle build template installed (${TEMPLATES_VERSION}):"
          ls android/build/ | head -20
          rm -rf /tmp/export_templates.tpz /tmp/godot_tpz/

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android \
            -keystore debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      - name: Prepare release keystore
        id: release_keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_B64" ]; then
            echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > release.keystore
            echo "has_release_keystore=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore ready — Android builds will be release-signed."
          else
            echo "has_release_keystore=false" >> "$GITHUB_OUTPUT"
            echo "No release keystore secret set — Android builds will use debug signing."
          fi

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/shutdown_adb_on_exit = false\n' \
            "${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/Users/runner/Library/Android/sdk}}" \
            > "$HOME/Library/Application Support/Godot/editor_settings-4.tres"

      - name: Disable custom Gradle build for Android APK preset only
        run: |
          python - <<'PY'
          # Disable gradle_build/use_gradle_build only for the "Android" (APK) preset.
          # The "Android AAB" preset keeps Gradle enabled for Play Store submission.
          import re
          from pathlib import Path
          path = Path("export_presets.cfg")
          lines = path.read_text().splitlines(keepends=True)
          out = []
          in_preset_header = False
          in_android_apk_options = False
          current_preset_name = None
          modified = 0
          for line in lines:
              stripped = line.strip()
              if re.match(r'\[preset\.\d+\]$', stripped):
                  in_preset_header = True
                  in_android_apk_options = False
                  current_preset_name = None
                  out.append(line)
                  continue
              if re.match(r'\[preset\.\d+\.options\]$', stripped):
                  in_preset_header = False
                  in_android_apk_options = (current_preset_name == "Android")
                  out.append(line)
                  continue
              if in_preset_header:
                  m = re.match(r'name="(.+)"', stripped)
                  if m:
                      current_preset_name = m.group(1)
              if in_android_apk_options and stripped == 'gradle_build/use_gradle_build=true':
                  out.append(line.replace('gradle_build/use_gradle_build=true',
                                          'gradle_build/use_gradle_build=false'))
                  modified += 1
                  continue
              out.append(line)
          if modified == 0:
              raise SystemExit(
                  "Expected gradle_build/use_gradle_build=true in the Android APK preset; "
                  "check export_presets.cfg."
              )
          path.write_text(''.join(out))
          print(f"Disabled Gradle build in {modified} Android APK preset option(s).")
          PY

      - name: Inject App Store Team ID into iOS preset
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # iOS handoff exports still require a non-empty Team ID in preset validation.
          # 0000000000 is a validation-only sentinel when no secret is configured.
          TEAM_ID="${APPLE_TEAM_ID:-0000000000}"
          export TEAM_ID
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          team_id = os.environ["TEAM_ID"]
          path = Path("export_presets.cfg")
          lines = path.read_text().splitlines()

          ios_preset_number = None
          current_preset = None
          in_preset_block = False
          for line in lines:
              stripped = line.strip()
              preset_match = re.match(r"\[preset\.(\d+)\]$", stripped)
              if preset_match:
                  current_preset = preset_match.group(1)
                  in_preset_block = True
                  continue
              if re.match(r"\[preset\.\d+\.options\]$", stripped):
                  in_preset_block = False
              if in_preset_block and stripped == 'platform="iOS"':
                  ios_preset_number = current_preset
                  break
          if ios_preset_number is None:
              raise SystemExit("iOS preset not found in export_presets.cfg")

          target_options_header = f"[preset.{ios_preset_number}.options]"
          out = []
          in_ios_options = False
          inserted = False
          for line in lines:
              stripped = line.strip()
              if stripped == target_options_header:
                  in_ios_options = True
                  out.append(line)
                  continue
              if in_ios_options and stripped.startswith("["):
                  if not inserted:
                      out.append(f'application/app_store_team_id="{team_id}"')
                      inserted = True
                  in_ios_options = False
              if in_ios_options and line.startswith("application/app_store_team_id="):
                  out.append(f'application/app_store_team_id="{team_id}"')
                  inserted = True
                  continue
              out.append(line)
          if in_ios_options and not inserted:
              out.append(f'application/app_store_team_id="{team_id}"')
          path.write_text("\n".join(out) + "\n")
          PY
        shell: bash

      - name: Export iOS/iPadOS Xcode project
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          # export_debug: true avoids a Godot-level xcodebuild signing conflict:
          # release mode writes CODE_SIGN_IDENTITY="Apple Distribution" but also
          # triggers automatic signing, causing an immediate archive failure.
          # Debug mode generates the Xcode project files only; the Release build
          # configuration is enforced by the caller's own xcodebuild step.
          export_debug: true
          use_preset_export_path: true
          presets_to_export: "iOS"

      - name: Export all platforms (debug-signed Android)
        if: steps.release_keystore.outputs.has_release_keystore != 'true'
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          use_preset_export_path: true
          presets_to_export: "Windows Desktop,Linux/X11,Android,Android AAB,macOS"
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ./debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
          # AAB preset has package/signed=true; fall back to debug keystore when no
          # release certificate is configured so the export succeeds in CI.
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ./debug.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: android

      - name: Export all platforms (release-signed Android)
        if: steps.release_keystore.outputs.has_release_keystore == 'true'
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          use_preset_export_path: true
          presets_to_export: "Windows Desktop,Linux/X11,Android,Android AAB,macOS"
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ./debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ./release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}

      - name: Flatten export outputs
        run: |
          # Windows Desktop → build/windows/
          if [ -d "build/windows/Windows Desktop" ]; then
            mv "build/windows/Windows Desktop/"* build/windows/
            rmdir "build/windows/Windows Desktop"
            echo "Flattened build/windows/Windows Desktop/ → build/windows/"
          fi
          # Linux/X11 → build/linux/
          if [ -d "build/linux/LinuxX11" ]; then
            mv "build/linux/LinuxX11/"* build/linux/
            rmdir "build/linux/LinuxX11"
            echo "Flattened build/linux/LinuxX11/ → build/linux/"
          fi
          # Android APK → build/android/
          if [ -d "build/android/Android" ]; then
            cp -a "build/android/Android/." "build/android/"
            rm -rf "build/android/Android"
            echo "Flattened build/android/Android/ → build/android/"
          fi
          # Android AAB → build/android/  (different filename, no collision with APK)
          if [ -d "build/android/Android AAB" ]; then
            cp -a "build/android/Android AAB/." "build/android/"
            rm -rf "build/android/Android AAB"
            echo "Flattened build/android/Android AAB/ → build/android/"
          fi
          # macOS → build/macos/
          if [ -d "build/macos/macOS" ]; then
            mv "build/macos/macOS/"* build/macos/
            rmdir "build/macos/macOS"
            echo "Flattened build/macos/macOS/ → build/macos/"
          fi

      - name: Verify Windows export
        run: |
          echo "Windows export contents:"
          ls -la build/windows/
          if [ ! -f build/windows/CorditeWars.exe ]; then
            echo "ERROR: CorditeWars.exe not found after export"
            exit 1
          fi
          if [ ! -f build/windows/CorditeWars.pck ]; then
            echo "ERROR: CorditeWars.pck not found after export"
            exit 1
          fi
          if [ ! -d build/windows/GodotSharp ] && ! compgen -G "build/windows/data_*_windows_*" > /dev/null; then
            echo "ERROR: No .NET runtime data directory found (expected GodotSharp or data_*_windows_*)"
            exit 1
          fi

      - name: Verify Linux export
        run: |
          echo "Linux export contents:"
          ls -la build/linux/
          if [ ! -f build/linux/CorditeWars.x86_64 ]; then
            echo "ERROR: CorditeWars.x86_64 not found after export"
            exit 1
          fi
          if [ ! -f build/linux/CorditeWars.pck ]; then
            echo "ERROR: CorditeWars.pck not found after export"
            exit 1
          fi
          if [ ! -d build/linux/GodotSharp ] && ! compgen -G "build/linux/data_*_linux*" > /dev/null; then
            echo "ERROR: No .NET runtime data directory found (expected GodotSharp or data_*_linux*)"
            exit 1
          fi

      - name: Verify Android exports
        run: |
          echo "Android build contents:"
          ls -la build/android/
          if [ ! -f build/android/CorditeWars.apk ]; then
            echo "ERROR: CorditeWars.apk not found"
            exit 1
          fi
          if [ ! -f build/android/CorditeWars.aab ]; then
            echo "ERROR: CorditeWars.aab not found"
            exit 1
          fi

      - name: Verify macOS export
        run: |
          echo "macOS export contents:"
          ls -la build/macos/
          if [ ! -f build/macos/CorditeWars.zip ]; then
            echo "ERROR: CorditeWars.zip not found after macOS export"
            exit 1
          fi

      - name: Extract macOS .app bundle from Godot zip
        run: |
          # Godot always exports macOS as a zip to preserve the .app bundle
          # structure with symlinks.  Extract it here so the artifact contains
          # plain files rather than a zip-inside-a-zip.  macOS's native unzip
          # preserves symlinks, so the .app bundle remains fully functional.
          unzip -q build/macos/CorditeWars.zip -d build/macos/
          rm build/macos/CorditeWars.zip
          echo "macOS build contents after extraction:"
          ls -la build/macos/

      - name: Ad-hoc sign macOS .app bundle
        run: |
          # Ad-hoc signing (-) satisfies macOS's minimum code-signature
          # requirement and prevents Gatekeeper from showing the "app is
          # damaged" error when users download and open the artifact directly.
          # Users will still need to right-click → Open on first launch until
          # the app is notarized with a real Apple Developer certificate.
          APP_PATH=$(find build/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --deep --force --sign - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          else
            echo "WARNING: No .app bundle found to sign"
          fi

      - name: Verify iOS export
        run: |
          echo "iOS export contents:"
          ls -la build/ios/ 2>/dev/null || echo "WARNING: build/ios/ not found"
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -20

      - name: Bundle iOS config into export
        run: |
          # Copy iOS platform configuration files into the exported Xcode project
          # so developers who download the artifact have everything they need to sign
          # and submit to the App Store without diving into the repo.
          if [ -d build/ios ]; then
            cp versions/ios/ios-info.plist build/ios/ios-info.plist
            cp versions/ios/ios-export-options.plist build/ios/ios-export-options.plist
            echo "Bundled iOS config files into artifact."
          else
            echo "WARNING: build/ios/ not found — skipping config bundle."
          fi

      - name: Upload Windows export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows/

      - name: Upload Linux export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux/

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Android
          path: build/android/CorditeWars.apk

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Android-AAB
          path: build/android/CorditeWars.aab

      - name: Upload iOS/iPadOS Handoff artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-iOS-iPadOS-Handoff
          path: build/ios/

      - name: Upload macOS export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos/

  # ─────────────────────────────────────────────────────────────────────────────
  # 1b. Package Windows EXE — Inno Setup installer (reliable, always runs)
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows-exe:
    name: Windows EXE Installer
    runs-on: windows-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export files
        shell: powershell
        run: |
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }

      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path dist\windows | Out-Null

      - name: Install Inno Setup 6
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build EXE installer (Inno Setup)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ needs.resolve-version.outputs.app_version }} `
            versions\windows\inno-setup.iss
          if (-not (Test-Path "dist\windows\CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe")) {
            throw "Inno Setup did not produce CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe"
          }
          Write-Host "EXE installer: dist\windows\CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe"

      - name: Upload EXE installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows-Setup-EXE
          path: dist/windows/CorditeWars_Setup_${{ needs.resolve-version.outputs.app_version }}.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # 1c. Package Windows MSI — WiX installer (independent of EXE build)
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows-msi:
    name: Windows MSI Installer
    runs-on: windows-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export files
        shell: powershell
        run: |
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }

      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path dist\windows | Out-Null

      - name: Install WiX Toolset v7
        shell: powershell
        run: dotnet tool install --global wix --version 7.0.0

      - name: Add WiX UI extension
        shell: powershell
        run: wix extension add --global WixToolset.UI.wixext/7.0.0

      - name: Build MSI installer (WiX)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wix build versions\windows\CorditeWars.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d BuildDir=build\windows `
            -d AppVersion=${{ needs.resolve-version.outputs.app_version }} `
            -out dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi
          if (-not (Test-Path "dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi")) {
            throw "WiX did not produce CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi"
          }
          Write-Host "MSI installer: dist\windows\CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi"

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows-MSI
          path: dist/windows/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.msi

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Package Linux Snap (runs after export-all)
  # ─────────────────────────────────────────────────────────────────────────────
  package-linux-snap:
    name: Linux Snap Package
    runs-on: ubuntu-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux

      - name: Normalize Linux binary name
        run: |
          # Godot exports as CorditeWars.x86_64; Snap expects CorditeWars
          if [ -f build/linux/CorditeWars.x86_64 ] && [ ! -f build/linux/CorditeWars ]; then
            cp build/linux/CorditeWars.x86_64 build/linux/CorditeWars
          fi
          chmod +x build/linux/CorditeWars
          echo "Linux build contents:"
          ls -la build/linux/

      - name: Inject app version into snapcraft.yaml
        run: |
          APP_VERSION="${{ needs.resolve-version.outputs.app_version }}"
          # Replace the hardcoded version line with the resolved app version so that
          # the published Snap package version always matches versions/shared/version.json.
          sed -i "s/^version: .*/version: '${APP_VERSION}'/" versions/linux/snapcraft.yaml
          echo "snapcraft.yaml version set to: ${APP_VERSION}"
          grep "^version:" versions/linux/snapcraft.yaml

      - name: Stage Linux export for Snapcraft
        run: |
          mkdir -p versions/linux/build/linux
          cp -R build/linux/. versions/linux/build/linux/
          echo "Snapcraft staged source contents:"
          ls -la versions/linux/build/linux/

      - name: Build Snap
        id: snapcraft
        uses: snapcore/action-build@v1.3.0
        with:
          path: versions/linux

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Linux-Snap
          path: ${{ steps.snapcraft.outputs.snap }}

  #     Code signing and notarization run only when Apple secrets are set.
  # ─────────────────────────────────────────────────────────────────────────────
  package-macos:
    name: macOS DMG Package
    runs-on: macos-latest
    needs: [export-all, resolve-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos

      - name: Check Apple signing secrets
        env:
          _APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          echo "HAS_APPLE_DEV_ID=${{ secrets.APPLE_DEV_ID != '' }}" >> "$GITHUB_ENV"
          echo "HAS_APPLE_ID=${{ secrets.APPLE_ID != '' }}" >> "$GITHUB_ENV"
          echo "HAS_AC_PASSWORD=${{ secrets.AC_PASSWORD != '' }}" >> "$GITHUB_ENV"

      - name: Locate .app bundle
        run: |
          mkdir -p dist/macos
          echo "Downloaded macOS build contents:"
          ls -la build/macos/
          # The .app bundle is now extracted directly into the artifact (no zip).
          APP_PATH=$(find build/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/macos/"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app bundle: $APP_PATH"

      - name: Code sign app bundle
        if: env.HAS_APPLE_DEV_ID == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: |
          codesign --deep --force --options runtime \
            --entitlements versions/macos/entitlements.plist \
            --sign "$APPLE_DEV_ID" \
            --timestamp \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "App bundle signed with: $APPLE_DEV_ID"

      - name: Ad-hoc sign app bundle (no Apple Developer ID)
        if: env.HAS_APPLE_DEV_ID == 'false'
        run: |
          # Ad-hoc signing (-) satisfies macOS's minimum code-signature requirement,
          # preventing the "app is damaged" Gatekeeper error for unsigned binaries.
          # Users will still need to right-click → Open the first time they launch
          # the app (until it is notarized with a real Apple Developer certificate).
          codesign --deep --force \
            --sign - \
            "$APP_PATH"
          echo "App bundle ad-hoc signed."

      - name: Create DMG
        run: |
          DMG_PATH="dist/macos/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.dmg"
          # Stage the .app in a clean directory so hdiutil places the bundle
          # (not its internals) at the root of the DMG volume.
          STAGING_DIR="dist/macos/staging"
          mkdir -p "$STAGING_DIR"
          # Use ditto (not cp -R) so app bundle metadata and symlinks are
          # preserved exactly; this prevents broken signatures/app bundles
          # that can trigger "app is damaged" on downloaded DMGs.
          STAGED_APP_PATH="$STAGING_DIR/$(basename "$APP_PATH")"
          ditto "$APP_PATH" "$STAGED_APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$STAGED_APP_PATH"
          hdiutil create \
            -volname "Cordite Wars" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "Created DMG: $DMG_PATH"

      - name: Sign DMG
        if: env.HAS_APPLE_DEV_ID == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: codesign --sign "$APPLE_DEV_ID" --timestamp "$DMG_PATH"

      - name: Ad-hoc sign DMG (no Apple Developer ID)
        if: env.HAS_APPLE_DEV_ID == 'false'
        run: codesign --force --sign - "$DMG_PATH"

      - name: Notarize and staple DMG
        if: env.HAS_APPLE_DEV_ID == 'true' && env.HAS_APPLE_ID == 'true' && env.HAS_AC_PASSWORD == 'true'
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "DMG notarized and stapled."

      - name: Verify DMG integrity
        run: |
          hdiutil verify "$DMG_PATH"
          MOUNT_POINT="$(mktemp -d)"
          ATTACHED=0
          if hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -readonly; then
            ATTACHED=1
            find "$MOUNT_POINT" -maxdepth 2 -name "*.app" -print
          fi
          if [ "$ATTACHED" -eq 1 ]; then
            hdiutil detach "$MOUNT_POINT" || true
          fi

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-macOS-DMG
          path: dist/macos/CorditeWars_${{ needs.resolve-version.outputs.app_version }}.dmg

  # ─────────────────────────────────────────────────────────────────────────────
  # 6a. Headless smoke test — Linux
  #     Launch the Linux export for 60 physics frames (2 s at 30 Hz) and assert
  #     a clean exit.  Catches crashes at startup before any artifact is published.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-linux:
    name: Headless Smoke Test (Linux)
    runs-on: ubuntu-latest
    needs: export-all

    steps:
      - name: Download Linux export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: smoke/

      - name: Make binary executable
        run: chmod +x smoke/CorditeWars.x86_64

      - name: Install virtual framebuffer
        run: sudo apt-get install -y xvfb

      - name: Run headless smoke test
        run: |
          set -euo pipefail
          echo "--- Linux export contents ---"
          ls -la smoke/

          # Run the game for 60 physics frames (2 s at 30 Hz), then exit.
          # xvfb-run provides a virtual display so the rendering driver can
          # initialise without a real monitor.  Exit code 0 means the engine
          # started, ran its main loop, and shut down cleanly.
          xvfb-run -a smoke/CorditeWars.x86_64 --headless --quit-after 60
          echo "Smoke test passed — game started and exited cleanly."

  # ─────────────────────────────────────────────────────────────────────────────
  # 6b. Headless smoke test — Windows
  #     Launch the Windows export for 60 physics frames on a real Windows runner.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-windows:
    name: Headless Smoke Test (Windows)
    runs-on: windows-latest
    needs: export-all

    steps:
      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: smoke/

      - name: Verify export and run headless smoke test
        shell: powershell
        run: |
          Write-Host "--- Windows export contents ---"
          Get-ChildItem smoke\
          if (-not (Test-Path "smoke\CorditeWars.exe")) {
            throw "CorditeWars.exe not found in smoke/ artifact."
          }

          # --headless tells Godot to skip display/audio initialisation.
          # --quit-after 60 stops the engine after 60 physics frames (≈2 s).
          $proc = Start-Process -FilePath "smoke\CorditeWars.exe" `
            -ArgumentList "--headless", "--quit-after", "60" `
            -NoNewWindow -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "Smoke test FAILED -- exit code $($proc.ExitCode)"
          }
          Write-Host "Smoke test passed -- game started and exited cleanly."

  # ─────────────────────────────────────────────────────────────────────────────
  # 6c. Headless smoke test — macOS
  #     Unzip the macOS .app bundle and run it headlessly on a real macOS runner.
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test-macos:
    name: Headless Smoke Test (macOS)
    runs-on: macos-latest
    needs: export-all

    steps:
      - name: Download macOS export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: smoke/

      - name: Locate game binary
        id: find_binary
        run: |
          # The .app bundle is now extracted directly in the artifact (no zip).
          APP=$(find smoke/ -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in smoke/"
            exit 1
          fi
          # The main executable inside a Godot .app bundle is always named after
          # the project (CorditeWars). Fall back to the first file only if it
          # cannot be found under the expected name.
          BINARY="$APP/Contents/MacOS/CorditeWars"
          if [ ! -f "$BINARY" ]; then
            BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          fi
          if [ -z "$BINARY" ]; then
            echo "ERROR: No executable found inside .app bundle at $APP/Contents/MacOS"
            exit 1
          fi
          chmod +x "$BINARY"
          echo "GAME_BINARY=$BINARY" >> "$GITHUB_ENV"
          echo "Found game binary: $BINARY"

      - name: Run headless smoke test
        run: |
          set -euo pipefail
          # --headless skips display/audio; --quit-after 60 exits after 60 frames.
          "$GAME_BINARY" --headless --quit-after 60
          echo "Smoke test passed — game started and exited cleanly."
