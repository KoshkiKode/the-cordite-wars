name: "Export Godot Project"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2-stable"
  APP_VERSION: "0.1.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Validate project — confirm the boot scene and all platform presets exist
  #    before spending runner minutes on exports.
  # ─────────────────────────────────────────────────────────────────────────────
  validate-project:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check boot scene and required project files
        run: |
          set -euo pipefail
          ERRORS=0

          check_file() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      $1"
            fi
          }

          # Core Godot project files
          check_file project.godot
          check_file export_presets.cfg
          check_file scenes/Core/Boot.tscn
          check_file scenes/UI/MainMenu.tscn
          check_file scenes/UI/SplashScreen.tscn

          # Autoload singletons
          check_file src/Core/GameManager.cs
          check_file src/Core/EventBus.cs
          check_file src/Systems/Audio/AudioManager.cs

          # C# project
          check_file CorditeWars.csproj

          # Platform packaging assets
          check_file versions/windows/inno-setup.iss
          check_file versions/windows/CorditeWars.wxs
          check_file versions/linux/snapcraft.yaml
          check_file versions/macos/entitlements.plist
          check_file versions/ios/ios-info.plist
          check_file versions/ios/ios-export-options.plist

          # Confirm Boot.tscn is the main scene
          if ! grep -q 'run/main_scene.*Boot\.tscn' project.godot; then
            echo "FAIL: project.godot does not set run/main_scene to Boot.tscn"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK:      project.godot -> Boot.tscn"
          fi

          # Confirm all five export presets are present
          for PRESET in "Windows Desktop" "Linux/X11" "Android" "iOS" "macOS"; do
            if ! grep -q "name=\"$PRESET\"" export_presets.cfg; then
              echo "FAIL: export_presets.cfg missing preset: $PRESET"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK:      export preset: $PRESET"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Project validation FAILED with $ERRORS error(s)."
            exit 1
          fi
          echo ""
          echo "Project validation passed."

  # ─────────────────────────────────────────────────────────────────────────────
  # 1a. Export Windows binary
  # ─────────────────────────────────────────────────────────────────────────────
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Export Windows
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          export_name: Windows Desktop

      - name: Verify Windows export
        run: |
          echo "Windows export contents:"
          ls -la build/windows/
          if [ ! -f build/windows/CorditeWars.exe ]; then
            echo "ERROR: CorditeWars.exe not found after export"
            exit 1
          fi

      - name: Upload Windows export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows/

  # ─────────────────────────────────────────────────────────────────────────────
  # 1b. Package Windows — builds both the Inno Setup .exe and WiX .msi installers
  # ─────────────────────────────────────────────────────────────────────────────
  package-windows:
    name: Windows Installers (EXE + MSI)
    runs-on: windows-latest
    needs: export-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows

      - name: Verify Windows export files
        shell: powershell
        run: |
          Write-Host "Windows export contents:"
          Get-ChildItem build\windows
          if (-not (Test-Path "build\windows\CorditeWars.exe")) {
            throw "CorditeWars.exe missing from Windows export artifact."
          }

      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path dist\windows | Out-Null

      - name: Install Inno Setup 6
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build EXE installer (Inno Setup)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" versions\windows\inno-setup.iss
          if (-not (Test-Path "dist\windows\CorditeWars_Setup_0.1.0.exe")) {
            throw "Inno Setup did not produce CorditeWars_Setup_0.1.0.exe"
          }
          Write-Host "EXE installer: dist\windows\CorditeWars_Setup_0.1.0.exe"

      - name: Install WiX Toolset v4
        shell: powershell
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX UI extension
        shell: powershell
        run: wix extension add --global WixToolset.UI.wixext/5.0.2

      - name: Build MSI installer (WiX)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          wix build versions\windows\CorditeWars.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d BuildDir=build\windows `
            -d AppVersion=${{ env.APP_VERSION }} `
            -out dist\windows\CorditeWars_${{ env.APP_VERSION }}.msi
          if (-not (Test-Path "dist\windows\CorditeWars_${{ env.APP_VERSION }}.msi")) {
            throw "WiX did not produce CorditeWars_${{ env.APP_VERSION }}.msi"
          }
          Write-Host "MSI installer: dist\windows\CorditeWars_${{ env.APP_VERSION }}.msi"

      - name: Upload EXE installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows-Setup-EXE
          path: dist/windows/CorditeWars_Setup_0.1.0.exe

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Windows-MSI
          path: dist/windows/CorditeWars_${{ env.APP_VERSION }}.msi

  # ─────────────────────────────────────────────────────────────────────────────
  # 2a. Export Linux binary
  # ─────────────────────────────────────────────────────────────────────────────
  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Export Linux
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          export_name: Linux/X11

      - name: Verify Linux export
        run: |
          echo "Linux export contents:"
          ls -la build/linux/
          if [ ! -f build/linux/CorditeWars.x86_64 ]; then
            echo "ERROR: CorditeWars.x86_64 not found after export"
            exit 1
          fi

      - name: Upload Linux export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux/

  # ─────────────────────────────────────────────────────────────────────────────
  # 2b. Package Linux Snap
  # ─────────────────────────────────────────────────────────────────────────────
  package-linux-snap:
    name: Linux Snap Package
    runs-on: ubuntu-latest
    needs: export-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux

      - name: Normalize Linux binary name
        run: |
          # Godot exports as CorditeWars.x86_64; Snap expects CorditeWars
          if [ -f build/linux/CorditeWars.x86_64 ] && [ ! -f build/linux/CorditeWars ]; then
            cp build/linux/CorditeWars.x86_64 build/linux/CorditeWars
          fi
          chmod +x build/linux/CorditeWars
          echo "Linux build contents:"
          ls -la build/linux/

      - name: Build Snap
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          path: versions/linux

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Linux-Snap
          path: ${{ steps.snapcraft.outputs.snap }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Export Android APK (release-signed when keystore secrets are set)
  # ─────────────────────────────────────────────────────────────────────────────
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android \
            -keystore debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_B64" ]; then
            echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > release.keystore
            echo "Release keystore ready — APK will be release-signed."
          else
            echo "No release keystore secret set — APK will use debug signing."
          fi

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\n' \
            "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" \
            > ~/.config/godot/editor_settings-4.tres

      - name: Export Android
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          export_name: Android
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ./debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ./release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}

      - name: Verify Android APK
        run: |
          echo "Android build contents:"
          ls -la build/android/
          if [ ! -f build/android/CorditeWars.apk ]; then
            echo "ERROR: CorditeWars.apk not found"
            exit 1
          fi

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-Android
          path: build/android/CorditeWars.apk

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. iOS/iPadOS Handoff — generates the Xcode project for local Mac with Xcode
  # ─────────────────────────────────────────────────────────────────────────────
  export-ios-handoff:
    name: iOS/iPadOS Handoff Export
    runs-on: macos-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Export iOS/iPadOS Xcode project
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          export_name: iOS

      - name: Verify iOS export
        run: |
          echo "iOS export contents:"
          ls -la build/ios/ 2>/dev/null || echo "WARNING: build/ios/ not found"
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) 2>/dev/null | head -20

      - name: Bundle iOS config into export
        run: |
          # Copy iOS platform configuration files into the exported Xcode project
          # so developers who download the artifact have everything they need to sign
          # and submit to the App Store without diving into the repo.
          if [ -d build/ios ]; then
            cp versions/ios/ios-info.plist build/ios/ios-info.plist
            cp versions/ios/ios-export-options.plist build/ios/ios-export-options.plist
            echo "Bundled iOS config files into artifact."
          else
            echo "WARNING: build/ios/ not found — skipping config bundle."
          fi

      - name: Upload iOS/iPadOS Handoff artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-iOS-iPadOS-Handoff
          path: build/ios/

  # ─────────────────────────────────────────────────────────────────────────────
  # 5a. Export macOS app bundle (universal binary via macos-latest runner)
  # ─────────────────────────────────────────────────────────────────────────────
  export-macos:
    name: macOS Export
    runs-on: macos-latest
    needs: validate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Export macOS
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: false
          export_name: macOS

      - name: Verify macOS export
        run: |
          echo "macOS export contents:"
          ls -la build/macos/
          if [ ! -f build/macos/CorditeWars.zip ]; then
            echo "ERROR: CorditeWars.zip not found after macOS export"
            exit 1
          fi

      - name: Upload macOS export artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos/CorditeWars.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # 5b. Package macOS — extract .app, optionally sign, create DMG
  #     Code signing and notarization run only when Apple secrets are set.
  # ─────────────────────────────────────────────────────────────────────────────
  package-macos:
    name: macOS DMG Package
    runs-on: macos-latest
    needs: export-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos

      - name: Extract .app bundle
        run: |
          mkdir -p dist/macos
          unzip -q build/macos/CorditeWars.zip -d dist/macos
          echo "Extracted contents:"
          ls -la dist/macos/
          # Locate the .app (Godot may nest it or name it differently)
          APP_PATH=$(find dist/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found after unzip"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found app bundle: $APP_PATH"

      - name: Code sign app bundle
        if: ${{ env.APPLE_DEV_ID != '' }}
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: |
          codesign --deep --force --options runtime \
            --entitlements versions/macos/entitlements.plist \
            --sign "$APPLE_DEV_ID" \
            --timestamp \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "App bundle signed with: $APPLE_DEV_ID"

      - name: Create DMG
        run: |
          DMG_PATH="dist/macos/CorditeWars_${{ env.APP_VERSION }}.dmg"
          hdiutil create \
            -volname "Cordite Wars" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "Created DMG: $DMG_PATH"

      - name: Sign DMG
        if: ${{ env.APPLE_DEV_ID != '' }}
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
        run: codesign --sign "$APPLE_DEV_ID" --timestamp "$DMG_PATH"

      - name: Notarize and staple DMG
        if: ${{ env.APPLE_DEV_ID != '' && env.APPLE_ID != '' && env.AC_PASSWORD != '' }}
        env:
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "DMG notarized and stapled."

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-macOS-DMG
          path: dist/macos/CorditeWars_${{ env.APP_VERSION }}.dmg

