name: "Run Tests"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Unit & Data Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/CorditeWars.Tests/CorditeWars.Tests.csproj

      - name: Build tests
        run: dotnet build tests/CorditeWars.Tests/CorditeWars.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/CorditeWars.Tests/CorditeWars.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --settings tests/CorditeWars.Tests/coverage.runsettings

      - name: Enforce minimum line coverage (75%)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python - <<'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET
          
          COBERTURA_RATE_MULTIPLIER = 100.0
          MINIMUM_COVERAGE = 75.0

          matches = glob.glob("tests/CorditeWars.Tests/TestResults/**/coverage.cobertura.xml", recursive=True)
          if not matches:
              print("No coverage.cobertura.xml file found.")
              sys.exit(1)
          
          coverage_file = max(matches, key=os.path.getmtime)
          root = ET.parse(coverage_file).getroot()
          line_rate = float(root.attrib.get("line-rate", "0")) * COBERTURA_RATE_MULTIPLIER
          print(f"Line coverage: {line_rate:.2f}%")
          
          if line_rate < MINIMUM_COVERAGE:
              print(f"Line coverage below required threshold of {MINIMUM_COVERAGE:.0f}%.")
              sys.exit(1)
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: tests/CorditeWars.Tests/TestResults/test-results.trx
          retention-days: 30
