name: "Setup Repository Labels"

# Creates the labels referenced by dependabot.yml and other workflows.
# Runs automatically on every push to main (idempotent — safe to re-run)
# and can be triggered manually from Actions → Setup Repository Labels.
on:
  push:
    branches: ["main"]
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/setup-labels.yml"
  workflow_dispatch:

permissions:
  issues: write   # required to create/update labels

jobs:
  labels:
    name: Create Missing Labels
    runs-on: ubuntu-latest
    steps:
      - name: Create labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              {
                name:        "dependencies",
                color:       "0075ca",
                description: "Pull requests that update a dependency file",
              },
              {
                name:        "github-actions",
                color:       "000000",
                description: "Pull requests that update GitHub Actions workflows",
              },
              {
                name:        "dotnet",
                color:       "512bd4",
                description: "Pull requests that update .NET / NuGet dependencies",
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`✓ Created label: ${label.name}`);
              } catch (err) {
                if (err.status === 422) {
                  // Label already exists — update description/color in case they drifted
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    ...label,
                  });
                  console.log(`↺ Updated label: ${label.name}`);
                } else {
                  throw err;
                }
              }
            }
