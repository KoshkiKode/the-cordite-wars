name: "Deploy to Steam"

# ─────────────────────────────────────────────────────────────────────────────
# DISABLED — Steam integration is commented out until a Steam App ID is obtained.
# Re-enable by restoring the `on:` triggers below.
# ─────────────────────────────────────────────────────────────────────────────
# on:
#   push:
#     tags:
#       - "v*"
#   workflow_dispatch:
#     inputs:
#       branch:
#         description: "Steam branch to set live (e.g. 'default', 'beta')"
#         required: false
#         default: "default"
on:
  workflow_dispatch:
    inputs:
      _disabled:
        description: "This workflow is disabled. Restore the on: triggers to re-enable."
        required: false

permissions:
  contents: read

env:
  STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Validate that all required Steam secrets are configured.
  #    Fails fast with a clear checklist before wasting runner minutes on a build.
  # ─────────────────────────────────────────────────────────────────────────────
  validate-secrets:
    name: Validate Steam Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAVE_APP_ID:        ${{ secrets.STEAM_APP_ID != '' }}
      HAVE_WINDOWS_DEPOT: ${{ secrets.STEAM_WINDOWS_DEPOT_ID != '' }}
      HAVE_LINUX_DEPOT:   ${{ secrets.STEAM_LINUX_DEPOT_ID != '' }}
      HAVE_MACOS_DEPOT:   ${{ secrets.STEAM_MACOS_DEPOT_ID != '' }}
      HAVE_USERNAME:      ${{ secrets.STEAM_USERNAME != '' }}
      HAVE_PASSWORD:      ${{ secrets.STEAM_PASSWORD != '' }}
    steps:
      - name: Check required secrets
        run: |
          MISSING=()
          [ "$HAVE_APP_ID"        != "true" ] && MISSING+=("STEAM_APP_ID")
          [ "$HAVE_WINDOWS_DEPOT" != "true" ] && MISSING+=("STEAM_WINDOWS_DEPOT_ID")
          [ "$HAVE_LINUX_DEPOT"   != "true" ] && MISSING+=("STEAM_LINUX_DEPOT_ID")
          [ "$HAVE_MACOS_DEPOT"   != "true" ] && MISSING+=("STEAM_MACOS_DEPOT_ID")
          [ "$HAVE_USERNAME"      != "true" ] && MISSING+=("STEAM_USERNAME")
          [ "$HAVE_PASSWORD"      != "true" ] && MISSING+=("STEAM_PASSWORD")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Steam deploy is missing required repository secrets:"
            for s in "${MISSING[@]}"; do
              echo "::error::  • $s"
            done
            echo ""
            echo "Add them at: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            echo "See docs/secrets-setup.md for where to find each value."
            exit 1
          fi

          echo "✅ All required Steam secrets are present."

      - name: Warn if STEAM_TOTP_SECRET is absent
        run: |
          # TOTP is optional but strongly recommended to avoid interactive 2FA prompts.
          if [ "${{ secrets.STEAM_TOTP_SECRET != '' }}" != "true" ]; then
            echo "::warning::STEAM_TOTP_SECRET is not set. SteamCMD will attempt login without a TOTP code." \
                         "This may fail if Steam Guard is enabled on the builder account." \
                         "See docs/secrets-setup.md → Steam Guard TOTP."
          fi

      - name: Guard against test App ID 480
        env:
          APP_ID: ${{ secrets.STEAM_APP_ID }}
        run: |
          if [ "${APP_ID}" = "480" ]; then
            echo "::error::STEAM_APP_ID is set to 480 (Valve 'Space War' test app)."
            echo "::error::Replace it with your real Cordite Wars App ID before deploying."
            echo "::error::See docs/secrets-setup.md → STEAM_APP_ID."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build all platform exports first (reuses the existing export workflow)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build All Platforms
    needs: validate-secrets
    uses: ./.github/workflows/export.yml
    permissions:
      contents: read

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Upload to Steam via SteamCMD
  # ─────────────────────────────────────────────────────────────────────────────
  steam-upload:
    name: Upload to Steam
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download platform exports produced by the build job ──────────────
      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows/

      - name: Download Linux export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux/

      - name: Download macOS export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos/

      # ── Substitute real App ID / Depot IDs into the VDF scripts ──────────
      - name: Patch VDF files
        env:
          WINDOWS_DEPOT_ID: ${{ secrets.STEAM_WINDOWS_DEPOT_ID }}
          LINUX_DEPOT_ID:   ${{ secrets.STEAM_LINUX_DEPOT_ID }}
          MACOS_DEPOT_ID:   ${{ secrets.STEAM_MACOS_DEPOT_ID }}
          STEAM_SET_LIVE_BRANCH: ${{ github.event.inputs.branch || 'default' }}
        run: |
          sed -i \
            -e "s/YOUR_STEAM_APP_ID/${STEAM_APP_ID}/g" \
            -e "s/YOUR_WINDOWS_DEPOT_ID/${WINDOWS_DEPOT_ID}/g" \
            -e "s/YOUR_LINUX_DEPOT_ID/${LINUX_DEPOT_ID}/g" \
            -e "s/YOUR_MACOS_DEPOT_ID/${MACOS_DEPOT_ID}/g" \
            -e "s/\"SetLive\"[[:space:]]*\"[^\"]*\"/\"SetLive\"     \"${STEAM_SET_LIVE_BRANCH}\"/" \
            steam/app-build.vdf \
            steam/windows-depot.vdf \
            steam/linux-depot.vdf \
            steam/macos-depot.vdf

      # ── Install SteamCMD ──────────────────────────────────────────────────
      - name: Install SteamCMD
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lib32gcc-s1
          mkdir -p ~/steamcmd
          cd ~/steamcmd
          curl -sSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar -xz
          echo "$HOME/steamcmd" >> "$GITHUB_PATH"

      # ── Upload to Steam ───────────────────────────────────────────────────
      - name: Upload build to Steam
        env:
          STEAM_USERNAME:    ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD:    ${{ secrets.STEAM_PASSWORD }}
          STEAM_TOTP_SECRET: ${{ secrets.STEAM_TOTP_SECRET }}
        run: |
          # Generate a one-time TOTP code from the shared secret (requires oathtool)
          sudo apt-get install -y oathtool 2>/dev/null || true
          TOTP_CODE=""
          if [ -n "${STEAM_TOTP_SECRET}" ]; then
            TOTP_CODE=$(oathtool --base32 --totp "${STEAM_TOTP_SECRET}" 2>/dev/null || true)
          fi

          ~/steamcmd/steamcmd.sh \
            +login "${STEAM_USERNAME}" "${STEAM_PASSWORD}" "${TOTP_CODE}" \
            +run_app_build "$(pwd)/steam/app-build.vdf" \
            +quit

      # ── Summarise result ──────────────────────────────────────────────────
      - name: Report upload result
        if: success()
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "### ✅ Steam Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App ID | ${STEAM_APP_ID} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.event.inputs.branch || 'default' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | Windows, Linux, macOS |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build is now live on the **default** branch." >> "$GITHUB_STEP_SUMMARY"
