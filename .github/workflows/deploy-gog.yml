name: "Deploy to GOG"

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when a versioned release tag is pushed, or
# manually from the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      branch:
        description: "GOG branch to publish to (e.g. 'master', 'beta')"
        required: false
        default: "master"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Validate that all required GOG secrets are configured.
  #    Fails fast with a clear checklist before wasting runner minutes on a build.
  # ─────────────────────────────────────────────────────────────────────────────
  validate-secrets:
    name: Validate GOG Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAVE_PRODUCT_ID:    ${{ secrets.GOG_PRODUCT_ID != '' }}
      HAVE_CLIENT_ID:     ${{ secrets.GOG_CLIENT_ID != '' }}
      HAVE_CLIENT_SECRET: ${{ secrets.GOG_CLIENT_SECRET != '' }}
      HAVE_USERNAME:      ${{ secrets.GOG_USERNAME != '' }}
      HAVE_PASSWORD:      ${{ secrets.GOG_PASSWORD != '' }}
    steps:
      - name: Check required secrets
        run: |
          MISSING=()
          [ "$HAVE_PRODUCT_ID"    != "true" ] && MISSING+=("GOG_PRODUCT_ID")
          [ "$HAVE_CLIENT_ID"     != "true" ] && MISSING+=("GOG_CLIENT_ID")
          [ "$HAVE_CLIENT_SECRET" != "true" ] && MISSING+=("GOG_CLIENT_SECRET")
          [ "$HAVE_USERNAME"      != "true" ] && MISSING+=("GOG_USERNAME")
          [ "$HAVE_PASSWORD"      != "true" ] && MISSING+=("GOG_PASSWORD")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::GOG deploy is missing required repository secrets:"
            for s in "${MISSING[@]}"; do
              echo "::error::  • $s"
            done
            echo ""
            echo "Add them at: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            echo "See docs/secrets-setup.md for where to find each value."
            exit 1
          fi

          echo "✅ All required GOG secrets are present."

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build all platform exports first (reuses the existing export workflow)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build All Platforms
    needs: validate-secrets
    uses: ./.github/workflows/export.yml
    permissions:
      contents: read

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Upload Windows build to GOG
  # ─────────────────────────────────────────────────────────────────────────────
  gog-upload-windows:
    name: GOG Upload (Windows)
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows
          path: build/windows/

      - name: Patch GOG build config
        shell: bash
        env:
          GOG_PRODUCT_ID:    ${{ secrets.GOG_PRODUCT_ID }}
          GOG_CLIENT_ID:     ${{ secrets.GOG_CLIENT_ID }}
          GOG_CLIENT_SECRET: ${{ secrets.GOG_CLIENT_SECRET }}
        run: |
          sed -i \
            -e "s/YOUR_GOG_PRODUCT_ID/${GOG_PRODUCT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_ID/${GOG_CLIENT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_SECRET/${GOG_CLIENT_SECRET}/g" \
            gog/build-windows.json

      - name: Install GOG Pipeline Builder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\gogpipe" | Out-Null
          Invoke-WebRequest `
            -Uri "https://pipeline-builder.gog.com/prod/windows/pipeline_builder.exe" `
            -OutFile "$env:USERPROFILE\gogpipe\pipeline_builder.exe"
          echo "$env:USERPROFILE\gogpipe" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Upload Windows build to GOG
        shell: powershell
        env:
          GOG_USERNAME: ${{ secrets.GOG_USERNAME }}
          GOG_PASSWORD: ${{ secrets.GOG_PASSWORD }}
          GOG_BRANCH:   ${{ github.event.inputs.branch || 'master' }}
        run: |
          $refName = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          pipeline_builder.exe build `
            --username  $env:GOG_USERNAME `
            --password  $env:GOG_PASSWORD `
            --version   $refName `
            --branch    $env:GOG_BRANCH `
            gog\build-windows.json

      - name: Report result
        if: success()
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "### ✅ GOG Windows Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch  | ${{ github.event.inputs.branch || 'master' }} |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Upload Linux build to GOG
  # ─────────────────────────────────────────────────────────────────────────────
  gog-upload-linux:
    name: GOG Upload (Linux)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: build/linux/

      - name: Patch GOG build config
        env:
          GOG_PRODUCT_ID:    ${{ secrets.GOG_PRODUCT_ID }}
          GOG_CLIENT_ID:     ${{ secrets.GOG_CLIENT_ID }}
          GOG_CLIENT_SECRET: ${{ secrets.GOG_CLIENT_SECRET }}
        run: |
          sed -i \
            -e "s/YOUR_GOG_PRODUCT_ID/${GOG_PRODUCT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_ID/${GOG_CLIENT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_SECRET/${GOG_CLIENT_SECRET}/g" \
            gog/build-linux.json

      - name: Install GOG Pipeline Builder
        run: |
          mkdir -p ~/gogpipe
          curl -sSL \
            "https://pipeline-builder.gog.com/prod/linux/pipeline_builder" \
            -o ~/gogpipe/pipeline_builder
          chmod +x ~/gogpipe/pipeline_builder
          echo "$HOME/gogpipe" >> "$GITHUB_PATH"

      - name: Upload Linux build to GOG
        env:
          GOG_USERNAME: ${{ secrets.GOG_USERNAME }}
          GOG_PASSWORD: ${{ secrets.GOG_PASSWORD }}
          GOG_BRANCH:   ${{ github.event.inputs.branch || 'master' }}
        run: |
          pipeline_builder build \
            --username  "$GOG_USERNAME" \
            --password  "$GOG_PASSWORD" \
            --version   "${GITHUB_REF_NAME:-dev}" \
            --branch    "$GOG_BRANCH" \
            gog/build-linux.json

      - name: Report result
        if: success()
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "### ✅ GOG Linux Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch  | ${{ github.event.inputs.branch || 'master' }} |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Upload macOS build to GOG
  # ─────────────────────────────────────────────────────────────────────────────
  gog-upload-macos:
    name: GOG Upload (macOS)
    needs: build
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS export
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-Export
          path: build/macos/

      - name: Locate .app bundle
        run: |
          echo "Downloaded macOS build contents:"
          ls -la build/macos/
          # The .app bundle is extracted directly in the artifact (no zip).
          APP_PATH=$(find build/macos -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/macos/"
            exit 1
          fi
          echo "Found .app bundle: $APP_PATH"

      - name: Patch GOG build config
        env:
          GOG_PRODUCT_ID:    ${{ secrets.GOG_PRODUCT_ID }}
          GOG_CLIENT_ID:     ${{ secrets.GOG_CLIENT_ID }}
          GOG_CLIENT_SECRET: ${{ secrets.GOG_CLIENT_SECRET }}
        run: |
          sed -i '' \
            -e "s/YOUR_GOG_PRODUCT_ID/${GOG_PRODUCT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_ID/${GOG_CLIENT_ID}/g" \
            -e "s/YOUR_GOG_CLIENT_SECRET/${GOG_CLIENT_SECRET}/g" \
            gog/build-macos.json

      - name: Install GOG Pipeline Builder
        run: |
          mkdir -p ~/gogpipe
          curl -sSL \
            "https://pipeline-builder.gog.com/prod/osx/pipeline_builder" \
            -o ~/gogpipe/pipeline_builder
          chmod +x ~/gogpipe/pipeline_builder
          echo "$HOME/gogpipe" >> "$GITHUB_PATH"

      - name: Upload macOS build to GOG
        env:
          GOG_USERNAME: ${{ secrets.GOG_USERNAME }}
          GOG_PASSWORD: ${{ secrets.GOG_PASSWORD }}
          GOG_BRANCH:   ${{ github.event.inputs.branch || 'master' }}
        run: |
          pipeline_builder build \
            --username  "$GOG_USERNAME" \
            --password  "$GOG_PASSWORD" \
            --version   "${GITHUB_REF_NAME:-dev}" \
            --branch    "$GOG_BRANCH" \
            gog/build-macos.json

      - name: Report result
        if: success()
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "### ✅ GOG macOS Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch  | ${{ github.event.inputs.branch || 'master' }} |" >> "$GITHUB_STEP_SUMMARY"
