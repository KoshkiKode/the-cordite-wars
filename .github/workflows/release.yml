name: "Create Release"
on:
  push:
    tags: [ "v*" ]

env:
  GODOT_VERSION: "4.6.2-stable"
  APP_VERSION: "1.0.0"

jobs:
  build-all-platforms:
    name: Build All Platforms
    uses: ./.github/workflows/export.yml

  create-release:
    name: Create GitHub Release
    needs: build-all-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download each platform artifact into its own raw directory ──────────

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Android
          path: artifacts/android-raw

      - name: Download Windows EXE installer
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows-Setup-EXE
          path: artifacts/windows-raw

      - name: Download Windows MSI installer
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Windows-MSI
          path: artifacts/windows-raw

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux
          path: artifacts/linux-raw

      - name: Download Linux Snap
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-Linux-Snap
          path: artifacts/linux-snap-raw

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-macOS-DMG
          path: artifacts/macos-raw

      - name: Download iOS/iPadOS Handoff
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-iOS-iPadOS-Handoff
          path: artifacts/ios-raw

      # ── Arrange files into the target folder hierarchy ──────────────────────
      #
      #   stage/
      #     android/          ← CorditeWars.apk
      #     windows/          ← .exe + .msi installers
      #     linux/            ← binary + .snap
      #     apple/
      #       macos/          ← .dmg
      #       ios/            ← Xcode project (iOS)
      #       ipados/         ← Xcode project (iPadOS — same binary as iOS)

      - name: Organise release tree
        run: |
          set -euo pipefail

          # android/
          mkdir -p stage/android
          cp artifacts/android-raw/CorditeWars.apk stage/android/

          # windows/
          mkdir -p stage/windows
          cp artifacts/windows-raw/*.exe stage/windows/ 2>/dev/null || true
          cp artifacts/windows-raw/*.msi stage/windows/ 2>/dev/null || true

          # linux/  (binary + runtime data + snap)
          mkdir -p stage/linux
          cp artifacts/linux-raw/CorditeWars.x86_64 stage/linux/ 2>/dev/null || true
          cp artifacts/linux-raw/CorditeWars.pck    stage/linux/ 2>/dev/null || true
          cp artifacts/linux-raw/*.dll               stage/linux/ 2>/dev/null || true
          if [ -d artifacts/linux-raw/GodotSharp ]; then
            cp -r artifacts/linux-raw/GodotSharp stage/linux/
          fi
          cp artifacts/linux-snap-raw/*.snap stage/linux/ 2>/dev/null || true

          # apple/macos/
          mkdir -p stage/apple/macos
          cp artifacts/macos-raw/*.dmg stage/apple/macos/ 2>/dev/null || true

          # apple/ios/ and apple/ipados/ (same Xcode project — universal for both)
          mkdir -p stage/apple/ios stage/apple/ipados
          cp -r artifacts/ios-raw/. stage/apple/ios/
          cp -r artifacts/ios-raw/. stage/apple/ipados/

          echo "--- Release tree ---"
          find stage -type f | sort

      # ── Create one ZIP per top-level folder ─────────────────────────────────

      - name: Create platform ZIP archives
        run: |
          set -euo pipefail
          mkdir -p zips
          cd stage
          zip -r ../zips/android.zip      android/
          zip -r ../zips/windows.zip      windows/
          zip -r ../zips/linux.zip        linux/
          zip -r ../zips/apple-macos.zip  apple/macos/
          zip -r ../zips/apple-ios.zip    apple/ios/
          zip -r ../zips/apple-ipados.zip apple/ipados/
          cd ..
          echo "--- ZIP archives ---"
          ls -lah zips/

      # ── SHA-256 checksums for all release ZIPs ───────────────────────────────

      - name: Generate checksums
        run: |
          cd zips
          sha256sum *.zip > checksums.txt
          echo "--- Checksums ---"
          cat checksums.txt

      # ── Release notes ────────────────────────────────────────────────────────

      - name: Create release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          cat > release_notes.md << 'NOTES'
          # 🎮 Cordite Wars: Six Fronts

          Each ZIP unpacks to a named folder containing the install files for that platform.

          | Download | Contents |
          |---|---|
          | `android.zip` | `android/CorditeWars.apk` — sideload APK |
          | `windows.zip` | `windows/CorditeWars_Setup_$APP_VERSION.exe` + `CorditeWars_$APP_VERSION.msi` |
          | `linux.zip` | `linux/CorditeWars.x86_64` (binary) + `linux/*.snap` (Snap package) |
          | `apple-macos.zip` | `apple/macos/CorditeWars_$APP_VERSION.dmg` |
          | `apple-ios.zip` | `apple/ios/` — Xcode project for App Store (iOS) |
          | `apple-ipados.zip` | `apple/ipados/` — Xcode project for App Store (iPadOS) |

          ## Store distribution

          - 🎮 **Steam** — auto-deployed via `deploy-steam` workflow
          - 🛒 **GOG** — auto-deployed via `deploy-gog` workflow
          - 🤖 **Google Play** — auto-deployed via `deploy-google-play` workflow
          - 📱 **App Store** — auto-deployed via `deploy-app-store` workflow

          ## Verify checksums

          ```bash
          sha256sum -c checksums.txt
          ```

          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          NOTES
          # Substitute the version placeholder
          sed -i "s/\$APP_VERSION/${{ env.APP_VERSION }}/g" release_notes.md

      # ── Publish ──────────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            zips/android.zip
            zips/windows.zip
            zips/linux.zip
            zips/apple-macos.zip
            zips/apple-ios.zip
            zips/apple-ipados.zip
            zips/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✓ Released ${{ github.ref_name }}"
          echo "  https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
