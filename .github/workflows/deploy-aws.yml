name: "Deploy Release Artifacts to AWS"

# Mirrors the artifacts attached to a published GitHub Release into the S3
# bucket that fronts CloudFront, so they can be served from KoshkiKode's own
# website (e.g. https://downloads.koshkikode.com/releases/<version>/...).
#
# Trigger: runs automatically when a GitHub Release is published, and can also
# be invoked manually for back-fill.
#
# Auth: assumes an IAM role via GitHub OIDC — no long-lived AWS keys.
# The role, bucket, and distribution are provisioned by `infra/aws/`.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re-)publish to AWS, e.g. v0.1.0"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for OIDC federation with AWS.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-to-s3:
    name: Sync release ${{ github.event.release.tag_name || inputs.tag }} to S3
    runs-on: ubuntu-latest

    # `release` environment lets you require manual approval and gate which
    # OIDC subjects can assume the AWS role (matches the Terraform default
    # `environment:release` subject).
    environment: release

    steps:
      - name: Resolve release tag and version
        id: meta
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine release tag." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Verify required configuration
        run: |
          set -euo pipefail
          missing=0
          for v in AWS_RELEASES_BUCKET AWS_RELEASES_ROLE_ARN AWS_REGION; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing repository variable: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Set the variables under Settings → Secrets and variables → Actions → Variables. See docs/aws-hosting-setup.md."
            exit 1
          fi
        env:
          AWS_RELEASES_BUCKET: ${{ vars.AWS_RELEASES_BUCKET }}
          AWS_RELEASES_ROLE_ARN: ${{ vars.AWS_RELEASES_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASES_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gh-cordite-release-${{ steps.meta.outputs.version }}

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # `gh release download` is preinstalled on ubuntu-latest runners.
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --skip-existing
          echo "Downloaded assets:"
          ls -lh dist/

      - name: Upload artifacts to S3
        env:
          BUCKET: ${{ vars.AWS_RELEASES_BUCKET }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          DEST="s3://${BUCKET}/releases/${VERSION}/"
          echo "Syncing dist/ → ${DEST}"
          # Immutable per-version artifacts: long cache, no transformation.
          aws s3 sync dist/ "$DEST" \
            --no-progress \
            --only-show-errors \
            --cache-control "public, max-age=31536000, immutable"
          echo "Uploaded files:"
          aws s3 ls "$DEST"

      - name: Update "latest" pointer
        env:
          BUCKET: ${{ vars.AWS_RELEASES_BUCKET }}
          VERSION: ${{ steps.meta.outputs.version }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          # Skip the "latest" alias for pre-releases.
          if [ "$PRERELEASE" = "true" ]; then
            echo "Pre-release — leaving 'latest' pointer untouched."
            exit 0
          fi
          # A small JSON manifest the website can fetch to discover the
          # current version without listing the bucket.
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "v${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "base_url": "releases/${VERSION}/"
          }
          EOF
          aws s3 cp latest.json "s3://${BUCKET}/releases/latest.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json" \
            --only-show-errors

      - name: Invalidate CloudFront cache (optional)
        if: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          DIST_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # Per-version paths are immutable, but we invalidate `latest.json`
          # and the version's directory so the CDN reflects the publish
          # immediately (otherwise default cache TTL applies).
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/releases/latest.json" "/releases/${VERSION}/*" \
            > /dev/null
          echo "Invalidation submitted for /releases/latest.json and /releases/${VERSION}/*"

      - name: Summary
        env:
          BUCKET: ${{ vars.AWS_RELEASES_BUCKET }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          {
            echo "### AWS release publish — \`v${VERSION}\`"
            echo ""
            echo "- **Bucket:** \`${BUCKET}\`"
            echo "- **Prefix:** \`releases/${VERSION}/\`"
            echo "- **Latest pointer:** \`releases/latest.json\` (skipped for pre-releases)"
            echo ""
            echo "Once DNS / CloudFront are configured, downloads are available at:"
            echo "\`https://<your-cdn-domain>/releases/${VERSION}/<filename>\`"
          } >> "$GITHUB_STEP_SUMMARY"
