name: "Deploy to App Store"

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when a versioned release tag is pushed, or
# manually from the Actions tab.
#
# Required secrets:
#   APPLE_DEV_ID               Apple Developer signing identity (e.g. "Developer ID Application: ...")
#   APPLE_ID                   Apple ID email for App Store Connect
#   APPLE_TEAM_ID              10-character team ID
#   AC_PASSWORD                App-specific password for altool / notarytool
#   IOS_PROVISIONING_PROFILE   Base64-encoded App Store distribution provisioning profile (.mobileprovision)
#   IOS_P12_CERTIFICATE        Base64-encoded iOS distribution certificate (.p12)
#   IOS_P12_PASSWORD           Password for the .p12 certificate
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Automatically submit the build for App Store review (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2-stable"
  APP_VERSION: "1.0.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Export iOS Xcode project via Godot
  # ─────────────────────────────────────────────────────────────────────────────
  export-ios:
    name: Export iOS Xcode Project
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build C# Assemblies
        run: dotnet build -c ExportRelease

      - name: Inject App Store Team ID into iOS preset
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TEAM_ID="${APPLE_TEAM_ID:?APPLE_TEAM_ID secret is required for App Store deployment}"
          export TEAM_ID
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          team_id = os.environ["TEAM_ID"]
          path = Path("export_presets.cfg")
          lines = path.read_text().splitlines()

          ios_preset_number = None
          current_preset = None
          in_preset_block = False
          for line in lines:
              stripped = line.strip()
              preset_match = re.match(r"\[preset\.(\d+)\]$", stripped)
              if preset_match:
                  current_preset = preset_match.group(1)
                  in_preset_block = True
                  continue
              if re.match(r"\[preset\.\d+\.options\]$", stripped):
                  in_preset_block = False
              if in_preset_block and stripped == 'platform="iOS"':
                  ios_preset_number = current_preset
                  break
          if ios_preset_number is None:
              raise SystemExit("iOS preset not found in export_presets.cfg")

          target_options_header = f"[preset.{ios_preset_number}.options]"
          out = []
          in_ios_options = False
          inserted = False
          for line in lines:
              stripped = line.strip()
              if stripped == target_options_header:
                  in_ios_options = True
                  out.append(line)
                  continue
              if in_ios_options and stripped.startswith("["):
                  if not inserted:
                      out.append(f'application/app_store_team_id="{team_id}"')
                      inserted = True
                  in_ios_options = False
              if in_ios_options and line.startswith("application/app_store_team_id="):
                  out.append(f'application/app_store_team_id="{team_id}"')
                  inserted = True
                  continue
              out.append(line)
          if in_ios_options and not inserted:
              out.append(f'application/app_store_team_id="{team_id}"')
          path.write_text("\n".join(out) + "\n")
          PY
        shell: bash

      - name: Export iOS Xcode project
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_macos.universal.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          # export_debug: true avoids a Godot-level xcodebuild signing conflict:
          # release mode writes CODE_SIGN_IDENTITY="Apple Distribution" but also
          # triggers automatic signing, causing an immediate archive failure.
          # Debug mode generates the Xcode project files only; the Release build
          # configuration is enforced by the xcodebuild archive step below.
          export_debug: true
          use_preset_export_path: true
          presets_to_export: "iOS"

      - name: Bundle iOS config files
        run: |
          if [ -d build/ios ]; then
            cp versions/ios/ios-info.plist      build/ios/ios-info.plist
            cp versions/ios/ios-export-options.plist build/ios/ios-export-options.plist
          fi

      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorditeWars-iOS-Xcode
          path: build/ios/

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Archive, sign, and upload the IPA to App Store Connect
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-app-store:
    name: Archive & Upload to App Store Connect
    needs: export-ios
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Xcode project
        uses: actions/download-artifact@v4
        with:
          name: CorditeWars-iOS-Xcode
          path: build/ios/

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/CorditeWars_AppStore.mobileprovision

      - name: Import signing certificate
        env:
          IOS_P12_CERTIFICATE: ${{ secrets.IOS_P12_CERTIFICATE }}
          IOS_P12_PASSWORD:    ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$IOS_P12_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$IOS_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

          rm /tmp/certificate.p12

      - name: Locate Xcode project
        id: find_xcodeproj
        run: |
          XCODEPROJ=$(find build/ios -maxdepth 3 -name "*.xcodeproj" | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "ERROR: No .xcodeproj found in build/ios/"
            exit 1
          fi
          XCODEPROJ_DIR=$(dirname "$XCODEPROJ")
          echo "XCODEPROJ=$XCODEPROJ" >> "$GITHUB_ENV"
          echo "XCODEPROJ_DIR=$XCODEPROJ_DIR" >> "$GITHUB_ENV"
          echo "Found Xcode project: $XCODEPROJ"

      - name: Prepare App Store export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/app-store-export-options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme   CorditeWars \
            -sdk      iphoneos \
            -configuration Release \
            -archivePath /tmp/CorditeWars.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            | xcpretty || true
          
          if [ ! -d /tmp/CorditeWars.xcarchive ]; then
            echo "ERROR: Xcode archive failed"
            exit 1
          fi

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath  /tmp/CorditeWars.xcarchive \
            -exportPath   /tmp/CorditeWars-IPA \
            -exportOptionsPlist /tmp/app-store-export-options.plist \
            | xcpretty || true
          
          IPA=$(find /tmp/CorditeWars-IPA -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA produced by exportArchive"
            exit 1
          fi
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
          echo "IPA path: $IPA"

      - name: Upload IPA to App Store Connect
        env:
          APPLE_ID:     ${{ secrets.APPLE_ID }}
          AC_PASSWORD:  ${{ secrets.AC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --upload-app \
            --type        ios \
            --file        "$IPA_PATH" \
            --username    "$APPLE_ID" \
            --password    "$AC_PASSWORD" \
            --asc-provider "$APPLE_TEAM_ID" \
            --verbose

      - name: Report result
        if: success()
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "### ✅ App Store Upload Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check [App Store Connect](https://appstoreconnect.apple.com) to submit for review." >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
