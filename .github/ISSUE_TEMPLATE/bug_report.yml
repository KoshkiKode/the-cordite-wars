name: Bug Report
description: Report a crash, desync, or gameplay bug
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! The more detail you provide, the faster we can fix it.
        For **security vulnerabilities**, see SECURITY.md and email security@koshkikode.com.

  - type: dropdown
    id: category
    attributes:
      label: Bug category
      options:
        - Crash / hard error
        - Multiplayer desync
        - Gameplay / simulation bug
        - Visual / rendering issue
        - Audio issue
        - UI / HUD issue
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a match with ...
        2. Build ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / Ubuntu 24.04 / macOS 15
        - Game version / build: v0.x.x or commit hash
        - Single-player or multiplayer?
        - If multiplayer: how many players, LAN or local?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the Godot log output or attach screenshots/recordings.
