# snapcraft.yaml — Snap package for Cordite Wars: Six Fronts
# Generated by generate_versions.py — do not edit directly.
# Build: snapcraft --destructive-mode (or snapcraft --use-lxd in CI)

name: cordite-wars
base: core22
version: 1.0.0
summary: Cordite Wars — Six Fronts real-time strategy
description: |
  Command six distinct factions across land, air, and sea in Cordite Wars:
  Six Fronts. A real-time strategy game inspired by Command & Conquer and
  Tempest Rising. Features deterministic multiplayer, full cross-platform
  support, and four graphical quality tiers for broad hardware compatibility.

  Minimum spec: Ubuntu 20.04 compatible, 4 GB RAM, OpenGL ES 3.0.

grade: stable
confinement: strict

architectures:
  - build-on: amd64
    build-for: amd64

apps:
  cordite-wars:
    command: CorditeWars
    command-chain: []
    extensions: [gnome]
    plugs:
      - audio-playback
      - opengl
      - x11
      - wayland
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - unity7

parts:
  game:
    plugin: dump
    source: build/linux/
    override-build: |
      craftctl default
      chmod +x "$SNAPCRAFT_PART_INSTALL/CorditeWars" || true
    stage-packages:
      - libgles2
      - libopenal1
      - libpulse0
      - libvulkan1
      - libx11-6
      - libxrandr2
      - libxinerama1
      - libxcursor1
      - libxi6
